<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipInsure Comparison Calculator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 16px; min-height: 100vh;
  zoom: 0.67; -moz-transform: scale(0.67); -moz-transform-origin: 0 0;
}
.container {
  max-width: 1200px; margin: 0 auto; background: white;
  border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
}

/* ── Top strip ── */
.top-strip {
  background: linear-gradient(135deg, #4a5fc1 0%, #6b7fd7 100%);
  padding: 10px 16px; display: flex; align-items: center;
  gap: 12px; flex-wrap: wrap; justify-content: space-between;
}
.logo-area { display:flex; align-items:center; gap:10px; flex-shrink:0; cursor:pointer; }
.logo-img { height:26px; }
.app-title { font-size:1em; font-weight:700; color:white; white-space:nowrap; }
.tab-bar {
  display:flex; gap:3px; background:rgba(0,0,0,0.2);
  padding:4px; border-radius:8px; flex-shrink:0;
}
.tab-btn {
  padding:5px 12px; font-size:0.78em; font-weight:600; border:none;
  border-radius:5px; background:transparent; color:rgba(255,255,255,0.7);
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.tab-btn.active { background:white; color:#4a5fc1; }
.controls-area { display:flex; gap:8px; align-items:center; }
.view-sel {
  display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,0.15); padding:5px 9px; border-radius:6px;
}
.view-sel label { font-size:0.79em; font-weight:600; color:white; white-space:nowrap; }
.view-sel select {
  padding:3px 7px; font-size:0.79em; border-radius:5px; border:none;
  background:white; color:#4a5fc1; font-weight:600;
}

/* ── Outputs strip ── */
.outputs-strip { background:#f4f5fb; border-bottom:2px solid #e0e3f5; padding:10px 16px; }
.outputs-inner { display:flex; flex-wrap:wrap; gap:8px; align-items:stretch; }
.om {
  background:white; padding:8px 12px; border-radius:8px;
  border:1px solid #e9ecef; flex:1; min-width:90px; text-align:center;
}
.om.primary { flex:0 0 auto; min-width:120px; border-color:rgba(40,167,69,0.3); background:linear-gradient(135deg,#f0fff4,rgba(212,244,221,0.6)); }
.om.si-om   { border-color:rgba(74,95,193,0.25); background:linear-gradient(135deg,#f8f9ff,rgba(235,238,255,0.5)); }
.om.diy-om  { border-color:rgba(230,126,34,0.25); background:linear-gradient(135deg,#fff9f5,rgba(255,238,220,0.5)); }
.om.comp-om { border-color:rgba(139,92,246,0.25); background:linear-gradient(135deg,#faf8ff,rgba(237,233,254,0.5)); }
.om.teal-om { border-color:rgba(20,184,166,0.25); background:linear-gradient(135deg,#f0fdfc,rgba(204,251,241,0.5)); }
.om-lbl { font-size:0.64em; color:#6c757d; text-transform:uppercase; font-weight:700; letter-spacing:0.3px; margin-bottom:3px; }
.om-big { font-size:1.5em; font-weight:800; color:#28a745; line-height:1.1; }
.om-val { font-size:1.05em; font-weight:700; color:#212529; }
.om-val.c-si   { color:#4a5fc1; }
.om-val.c-diy  { color:#e67e22; }
.om-val.c-comp { color:#8b5cf6; }
.om-val.c-teal { color:#14b8a6; }
.om-val.c-red  { color:#dc3545; }
.om-val.c-grn  { color:#28a745; }

/* ── Middle section ── */
.middle-section { padding:14px 16px; display:flex; flex-direction:column; gap:12px; }
.headline-row { display:flex; justify-content:center; }
.headline-box {
  color:white; border-radius:12px; padding:12px 36px;
  text-align:center; min-width:240px;
}
.headline-box.hb-si   { background:linear-gradient(135deg,#4a5fc1,#6b7fd7); box-shadow:0 6px 20px rgba(74,95,193,0.3); }
.headline-box.hb-teal { background:linear-gradient(135deg,#0d9488,#14b8a6); box-shadow:0 6px 20px rgba(20,184,166,0.3); }
.hl-lbl  { font-size:0.72em; font-weight:700; text-transform:uppercase; letter-spacing:1px; opacity:0.85; margin-bottom:2px; }
.hl-val  { font-size:2.4em; font-weight:800; line-height:1; }
.hl-bd   { display:flex; gap:10px; justify-content:center; margin-top:6px; flex-wrap:wrap; }
.hl-pill { font-size:0.73em; font-weight:700; opacity:0.9; background:rgba(255,255,255,0.18); border-radius:20px; padding:2px 10px; white-space:nowrap; }

/* ── Cards row ── */
.cards-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ccard { border-radius:10px; padding:14px 16px; }
.ccard.cc-diy  { border-left:4px solid #e67e22; background:linear-gradient(135deg,#fff9f5,#ffeedd); }
.ccard.cc-si   { border-left:4px solid #4a5fc1; background:linear-gradient(135deg,#f8f9ff,#ebeeff); }
.ccard.cc-comp { border-left:4px solid #8b5cf6; background:linear-gradient(135deg,#faf8ff,#ede9fe); }
.ccard.cc-teal { border-left:4px solid #14b8a6; background:linear-gradient(135deg,#f0fdfc,#ccfbf1); }
.ccard.cc-cost { border-left:4px solid #dc3545; background:linear-gradient(135deg,#fff5f5,#ffe8e8); }
.card-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:8px; flex-wrap:wrap; }
.card-hdr h3 { color:#495057; font-size:0.75em; text-transform:uppercase; letter-spacing:0.5px; }
.card-ttl { font-size:1.5em; font-weight:800; white-space:nowrap; }
.card-ttl.c-si   { color:#4a5fc1; }
.card-ttl.c-diy  { color:#e67e22; }
.card-ttl.c-comp { color:#8b5cf6; }
.card-ttl.c-teal { color:#14b8a6; }
.card-ttl.c-red  { color:#dc3545; }
.card-ttl.c-grn  { color:#28a745; }
.mgrids { display:grid; grid-template-columns:repeat(auto-fit,minmax(118px,1fr)); gap:7px; }
.mi { background:white; padding:9px 11px; border-radius:6px; border:1px solid #e9ecef; }
.mi h4 { font-size:0.68em; color:#6c757d; margin-bottom:3px; text-transform:uppercase; }
.mi .mv { font-size:1.05em; font-weight:600; color:#212529; }
.ss-lbl { font-size:0.68em; font-weight:700; color:#6c757d; text-transform:uppercase; letter-spacing:0.5px; margin-top:10px; margin-bottom:5px; padding-top:8px; border-top:1px dashed #dee2e6; }

/* ── Inputs strip ── */
.inputs-strip { background:#f4f5fb; border-top:2px solid #e0e3f5; padding:10px 16px; display:flex; flex-direction:column; gap:8px; }
.inputs-hdr { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.inputs-title { font-size:0.72em; font-weight:800; color:#4a5fc1; text-transform:uppercase; letter-spacing:1px; }
.irow { display:flex; flex-wrap:wrap; gap:8px; align-items:flex-start; }
.ig {
  flex:1 1 0; min-width:110px;
  background:linear-gradient(135deg,#5b6dd1,#7b8de8);
  padding:8px 10px; border-radius:8px;
}
.ig.ig-diy  { background:linear-gradient(135deg,#e67e22,#f0a04b); }
.ig.ig-comp { background:linear-gradient(135deg,#7c3aed,#8b5cf6); }
.ig.ig-teal { background:linear-gradient(135deg,#0d9488,#14b8a6); }
.ig label { display:block; font-weight:700; color:white; margin-bottom:5px; font-size:0.78em; }
.ig input, .ig select {
  width:100%; padding:6px 10px; border:none; border-radius:6px;
  font-size:0.9em; background:white; color:#333; font-weight:500;
}
.ig input::placeholder { color:#bbb; font-weight:400; }
.ig input:focus, .ig select:focus { outline:none; box-shadow:0 0 0 2px rgba(255,255,255,0.35); }
.glbtn {
  display:flex; align-items:center; gap:6px; padding:7px 12px;
  font-size:0.82em; border-radius:7px; border:2px solid #4a5fc1;
  background:#4a5fc1; color:white; font-weight:700; cursor:pointer; white-space:nowrap;
}
.link-row { display:flex; gap:5px; }
.link-row input { flex:1; padding:5px 8px; border:1px solid #ddd; border-radius:5px; font-size:0.72em; }
.cpybtn { padding:5px 10px; background:#28a745; color:white; border:none; border-radius:5px; font-size:0.72em; font-weight:700; cursor:pointer; }

/* ── Breakdown ── */
.calc-breakdown { border-top:2px solid #e0e3f5; }
.ctoggle { width:100%; padding:11px 16px; background:#f4f5fb; border:none; color:#4a5fc1; font-family:inherit; font-size:0.8em; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; transition:background 0.15s; }
.ctoggle:hover { background:#e8eaf6; }
.ct-arrow { font-size:0.7em; color:#9ca3af; transition:transform 0.2s; display:inline-block; }
.ct-arrow.open { transform:rotate(90deg); }
.bd-body { display:none; border-top:1px solid #e0e3f5; background:white; }
.bd-body.visible { display:block; }
.bd-shared { padding:10px 16px 12px; border-bottom:1px solid #e0e3f5; background:#fafbff; }
.bd-cols { display:grid; grid-template-columns:1fr 1fr; }
.bd-col { padding:10px 16px 14px; }
.bd-col:first-child { border-right:1px solid #e0e3f5; }
.bd-t { font-size:0.67em; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid #e0e3f5; }
.bd-t.t-sh   { color:#6c757d; }
.bd-t.t-diy  { color:#e67e22; }
.bd-t.t-si   { color:#4a5fc1; }
.bd-t.t-comp { color:#8b5cf6; }
.bd-t.t-teal { color:#14b8a6; }
.bd-t.t-cost { color:#dc3545; }
.bdr { display:grid; grid-template-columns:155px 1fr auto; gap:6px; align-items:baseline; padding:2px 0; font-size:0.74em; border-bottom:1px solid rgba(0,0,0,0.035); }
.bdr .bl { color:#6c757d; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bdr .be { font-family:monospace; color:#495057; opacity:0.65; font-size:0.88em; }
.bdr .bv { font-family:monospace; color:#212529; font-weight:600; text-align:right; white-space:nowrap; }
.bdr.sep { border-top:1px solid #dee2e6; margin-top:5px; padding-top:5px; border-bottom:none; }
.bdr.sep .bl { color:#212529; font-weight:700; }
.bdr.sep.s-diy  .bv { color:#e67e22; font-weight:700; }
.bdr.sep.s-si   .bv { color:#4a5fc1; font-weight:700; }
.bdr.sep.s-comp .bv { color:#8b5cf6; font-weight:700; }
.bdr.sep.s-teal .bv { color:#14b8a6; font-weight:700; }
.bdr.sep.s-grn  .bv { color:#28a745; font-weight:700; }
.bdr.sep.s-red  .bv { color:#dc3545; font-weight:700; }

@media(max-width:900px){ .cards-row{grid-template-columns:1fr;} .bd-cols{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="container">

  <!-- Top strip -->
  <div class="top-strip">
    <div class="logo-area" onclick="resetAll()">
      <img src="https://raw.githubusercontent.com/drewshafe/si-roi-calculator/main/2026si.png"
           alt="ShipInsure" class="logo-img" onerror="this.style.display='none'">
      <span class="app-title">ShipInsure Comparison Calculator</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-mode="m1" onclick="setMode('m1')">Self-Insure</button>
      <button class="tab-btn" data-mode="m2" onclick="setMode('m2')">vs Another Provider</button>
      <button class="tab-btn" data-mode="m3" onclick="setMode('m3')">Returns Offset</button>
    </div>
    <div class="controls-area">
      <div class="view-sel">
        <label>View:</label>
        <select id="timeframe" onchange="recalculate()">
          <option value="monthly">Monthly</option>
          <option value="annual">Annual</option>
        </select>
      </div>
      <div class="view-sel">
        <label>SI Pricing:</label>
        <select id="siTemplate" onchange="recalculate()">
          <option value="percentage">%-Based</option>
          <option value="1.5_accurate">1.5% Acc</option>
          <option value="2_accurate">2% Acc</option>
          <option value="2_round_50">2% Round</option>
          <option value="2.5_accurate">2.5% Acc</option>
          <option value="3_accurate">3% Acc</option>
          <option value="3.5_accurate">3.5% Acc</option>
          <option value="static_1.50_300_2.00">Static $1.50/$2</option>
          <option value="flat_1.50">Flat $1.50</option>
          <option value="flat_5.95">Flat $5.95</option>
          <option value="2_flat_0.98">2% Min $0.98</option>
          <option value="3_accurate_100_1.95">3% Min $1.95</option>
          <option value="born_primitive">Born Prim</option>
          <option value="og_6.5_19.99_3">OG 6.5%/$19.99/3%</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Outputs strip -->
  <div class="outputs-strip">
    <div class="outputs-inner" id="outputsInner"></div>
  </div>

  <!-- Middle -->
  <div class="middle-section">
    <div class="headline-row">
      <div class="headline-box hb-si" id="headlineBox">
        <div class="hl-lbl" id="hlLabel">SI Advantage vs Self-Insure</div>
        <div class="hl-val" id="hlValue">$0</div>
        <div class="hl-bd" id="hlBd">
          <div class="hl-pill" id="hlP1">—</div>
          <div class="hl-pill" id="hlP2">—</div>
        </div>
      </div>
    </div>
    <div class="cards-row">
      <div class="ccard cc-diy" id="leftCard">
        <div class="card-hdr">
          <h3 id="lcTitle">Self-Insure Program</h3>
          <div class="card-ttl c-diy" id="lcTotal">$0</div>
        </div>
        <div class="mgrids" id="lcMetrics"></div>
      </div>
      <div class="ccard cc-si" id="rightCard">
        <div class="card-hdr">
          <h3 id="rcTitle">ShipInsure Program</h3>
          <div class="card-ttl c-si" id="rcTotal">$0</div>
        </div>
        <div class="mgrids" id="rcMetrics"></div>
      </div>
    </div>
  </div>

  <!-- Inputs strip -->
  <div class="inputs-strip">
    <div class="inputs-hdr">
      <span class="inputs-title">Merchant Inputs</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="glbtn" onclick="generateLink()">📋 Generate Link</button>
      </div>
    </div>

    <!-- Shared: always visible -->
    <div class="irow" id="sharedRow">
      <div class="ig">
        <label>Monthly Orders</label>
        <input type="text" id="orders" placeholder="0">
      </div>
      <div class="ig">
        <label>AOV</label>
        <input type="text" id="aov" placeholder="$">
      </div>
      <div class="ig">
        <label>Claims Rate %</label>
        <input type="text" id="claimsRate" placeholder="0">
      </div>
      <!-- COGS + CS: shown for m1, m2 -->
      <div class="ig" id="cogsRow">
        <label>COGS %</label>
        <input type="text" id="cogsPercent" placeholder="0">
      </div>
      <div class="ig" id="csRow">
        <label>CS Cost / Claim</label>
        <input type="text" id="csCost" placeholder="$">
      </div>
    </div>

    <!-- Mode 1: DIY + SI inputs -->
    <div class="irow" id="m1Row" style="display:none;">
      <div class="ig ig-diy">
        <label>DIY Premium %</label>
        <input type="text" id="diyPremRate" placeholder="3.00" value="3.00">
      </div>
      <div class="ig ig-diy">
        <label>DIY Attach Rate %</label>
        <input type="text" id="diyAttach" placeholder="60" value="60">
      </div>
      <div class="ig" id="siPremGroup">
        <label>SI Premium %</label>
        <input type="text" id="siPremRate" placeholder="3.00" value="3.00">
      </div>
      <div class="ig">
        <label>SI Attach Rate %</label>
        <input type="text" id="siAttach" placeholder="68" value="68">
      </div>
      <div class="ig">
        <label>Rev Share %</label>
        <input type="text" id="revShare" placeholder="35" value="35">
      </div>
    </div>

    <!-- Mode 2: Competitor + SI inputs -->
    <div class="irow" id="m2Row" style="display:none;">
      <div class="ig ig-comp">
        <label>Competitor</label>
        <select id="compName">
          <option>Corso</option><option>Onward</option><option>Redo</option>
          <option>Route</option><option>Seel</option><option>Other</option>
        </select>
      </div>
      <div class="ig ig-comp">
        <label>Comp Premium %</label>
        <input type="text" id="compPremRate" placeholder="3.00" value="3.00">
      </div>
      <div class="ig ig-comp">
        <label>Comp Attach Rate %</label>
        <input type="text" id="compAttach" placeholder="50" value="50">
      </div>
      <div class="ig ig-comp">
        <label>Comp Rev Share %</label>
        <input type="text" id="compRevShare" placeholder="0" value="0">
      </div>
      <div class="ig" id="siPremGroupM2">
        <label>SI Premium %</label>
        <input type="text" id="siPremRateM2" placeholder="3.00" value="3.00">
      </div>
      <div class="ig">
        <label>SI Attach Rate %</label>
        <input type="text" id="siAttachM2" placeholder="68" value="68">
      </div>
      <div class="ig">
        <label>SI Rev Share %</label>
        <input type="text" id="revShareM2" placeholder="35" value="35">
      </div>
    </div>

    <!-- Mode 3: Returns inputs -->
    <div class="irow" id="m3Row" style="display:none;">
      <div class="ig ig-teal">
        <label>Returns Rate %</label>
        <input type="text" id="returnsRate" placeholder="0">
      </div>
      <div class="ig ig-teal">
        <label>Return Label Cost</label>
        <input type="text" id="returnLabelCost" placeholder="$">
      </div>
      <div class="ig ig-teal">
        <label>Platform Fee ($/mo)</label>
        <input type="text" id="platformFee" placeholder="$">
      </div>
      <div class="ig" id="siPremGroupM3">
        <label>SI Premium %</label>
        <input type="text" id="siPremRateM3" placeholder="3.00" value="3.00">
      </div>
      <div class="ig">
        <label>SI Attach Rate %</label>
        <input type="text" id="siAttachM3" placeholder="68" value="68">
      </div>
    </div>

    <!-- Link display -->
    <div id="linkDisplay" style="display:none;flex-direction:column;gap:5px;">
      <p style="font-size:0.72em;color:#6c757d;">Share this link:</p>
      <div class="link-row">
        <input type="text" id="shareableLink" readonly>
        <button class="cpybtn" onclick="copyLink()">Copy</button>
      </div>
    </div>
  </div>

  <!-- Calc breakdown -->
  <div class="calc-breakdown">
    <button class="ctoggle" onclick="toggleBreakdown(this)">
      <span class="ct-arrow" id="bdArrow">▶</span>
      📋 Show Calculation Breakdown
    </button>
    <div class="bd-body" id="bdBody">
      <div class="bd-shared">
        <div class="bd-t t-sh">Inputs &amp; Derived Values</div>
        <div id="bd-shared"></div>
      </div>
      <div class="bd-cols">
        <div class="bd-col">
          <div class="bd-t" id="bdLeftT">Self-Insure Program</div>
          <div id="bd-left"></div>
        </div>
        <div class="bd-col">
          <div class="bd-t t-si">ShipInsure Program</div>
          <div id="bd-right"></div>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
// ─── STATE ───
let _mode = 'm1';
let _bd   = {};

// ─── PRICING TEMPLATES ───
const PT = {

    {min:491,max:599,p:10.30},{min:599,max:732,p:12.59},{min:732,max:894,p:15.38},{min:894,max:1093,p:18.78},
    {min:1093,max:1335,p:22.95},{min:1335,max:1631,p:28.03},{min:1631,max:1992,p:34.25},{min:1992,max:10000,p:41.83}

function getTieredPremium(aov, tmpl) {
  const tiers = PT[tmpl];
  if (!tiers) return 0;
  if (typeof tiers === 'string') {
    const parts = tiers.replace('USE_PERCENTAGE_','').split('_MIN_');
    const calc = aov * parseFloat(parts[0]) / 100;
    return parts[1] ? Math.max(calc, parseFloat(parts[1])) : calc;
  }
  for (const t of tiers) {
    if (aov >= t.min && aov < t.max) return t.pct ? aov * t.pct : t.p;
  }
  const last = tiers[tiers.length-1];
  return last.pct ? aov * last.pct : last.p;
}

const fn  = v => new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(v);
const pct = v => (v*100).toFixed(2).replace(/\.?0+$/,'')+'%';
const fp  = v => v.toFixed(1)+'%';

function v(id)  { return parseFloat((document.getElementById(id)?.value||'').replace(/,/g,''))||0; }
function vs(id) { return document.getElementById(id)?.value||''; }

// ─── MODE SWITCHING ───
function setMode(mode) {
  _mode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('m1Row').style.display = mode==='m1' ? 'flex' : 'none';

function toggleSiPremVisibility() {
  const tmpl = vs('siTemplate');

// ─── MAIN RECALCULATE ───
function recalculate() {
  toggleSiPremVisibility();
  if (_mode === 'm1') calcM1();
  else if (_mode === 'm2') calcM2();
  else calcM3();
  if (document.getElementById('bdBody').classList.contains('visible')) renderBreakdown();
}

// ─── MODE 1: SELF-INSURE vs SI ───
function calcM1() {
  const isAnnual = vs('timeframe') === 'annual';
  const mul = isAnnual ? 12 : 1;
  const tmpl = vs('siTemplate');

  const monthlyOrders = v('orders');
  const aov           = v('aov');
  const claimsP       = v('claimsRate') / 100;
  const cogsP         = v('cogsPercent') / 100;
  const csPerClaim    = v('csCost');
  const diyPremP      = v('diyPremRate') / 100;
  const diyAttachP    = v('diyAttach') / 100;
  const siPremP       = v('siPremRate') / 100;
  const siAttachP     = v('siAttach') / 100;
  const revShareP     = v('revShare') / 100;

  const orders   = monthlyOrders * mul;
  const diyAvgP  = aov * diyPremP;
  const siAvgP   = tmpl === 'percentage' ? aov * siPremP : getTieredPremium(aov, tmpl);
  const costPerClaim = aov * cogsP + csPerClaim;

  // DIY
  const diyProtOrders  = orders * diyAttachP;
  const diyPremiumsIn  = diyProtOrders * diyAvgP;
  const diyProtClaims  = diyProtOrders * claimsP;
  const diyClaimsCost  = diyProtClaims * costPerClaim;
  const diyDFI         = diyPremiumsIn - diyClaimsCost;

  // SI
  const siProtOrders   = orders * siAttachP;
  const siPremiumsIn   = siProtOrders * siAvgP;
  const siProtClaims   = siProtOrders * claimsP;
  const siFunded       = siProtClaims * aov;
  const postClaimBal   = siPremiumsIn - siFunded;
  const siRevShare     = postClaimBal * revShareP;
  const siDFI          = siFunded + siRevShare;
  const advantage      = siDFI - diyDFI;

  // Outputs strip
  document.getElementById('outputsInner').innerHTML =
    omPrimary(fn(orders), isAnnual ? 'Annual Orders' : 'Monthly Orders') +
    om('SI Protected Orders', fn(siProtOrders), 'si-om', 'c-si') +
    om('DIY Protected Orders', fn(diyProtOrders), 'diy-om', 'c-diy') +
    om('Avg SI Premium', fcc(siAvgP), 'si-om', 'c-si') +
    om('SI Premiums Collected', fc(siPremiumsIn), 'si-om', 'c-si') +
    om('Avg DIY Premium', fcc(diyAvgP), 'diy-om', 'c-diy') +
    om('DIY Premiums Collected', fc(diyPremiumsIn), 'diy-om', 'c-diy');

  // Headline
  setHeadline('hb-si', 'SI Direct Financial Advantage', fc(advantage),
    fc(siRevShare) + ' rev share', fc(siFunded) + ' claims funded');

  // Left card: DIY
  document.getElementById('lcTitle').textContent = 'Self-Insure Program';
  document.getElementById('lcTotal').className = 'card-ttl c-diy';
  document.getElementById('lcTotal').textContent = fc(diyDFI);
  document.getElementById('leftCard').className = 'ccard cc-diy';
  document.getElementById('lcMetrics').innerHTML =
    mi('Gross Premiums In', fc(diyPremiumsIn)) +
    mi('Protected Claims', fn(diyProtClaims)) +
    mi('Claims Cost (at COGS+CS)', fc(diyClaimsCost)) +
    mi('Net DFI', fc(diyDFI));

  // Right card: SI
  document.getElementById('rcTitle').textContent = 'ShipInsure Program';
  document.getElementById('rcTotal').className = 'card-ttl c-si';
  document.getElementById('rcTotal').textContent = fc(siDFI);
  document.getElementById('rightCard').className = 'ccard cc-si';
  document.getElementById('rcMetrics').innerHTML =
    mi('SI Premiums Collected', fc(siPremiumsIn)) +
    mi('SI Funded Claims (@ AOV)', fc(siFunded)) +
    mi('Post-Claim Balance', fc(postClaimBal)) +
    mi('Rev Share to Merchant', fc(siRevShare));

  _bd = { mode:'m1', orders, aov, claimsP, cogsP, csPerClaim, costPerClaim,
          diyAvgP, diyAttachP, diyProtOrders, diyPremiumsIn, diyProtClaims, diyClaimsCost, diyDFI,
          siAvgP, siAttachP, siProtOrders, siPremiumsIn, siProtClaims, siFunded, postClaimBal, siRevShare, siDFI,
          revShareP, advantage, ready:true };
}

// ─── MODE 2: ANOTHER PROVIDER ───
function calcM2() {
  const isAnnual = vs('timeframe') === 'annual';
  const mul = isAnnual ? 12 : 1;
  const tmpl = vs('siTemplate');
  const compName = vs('compName');

  const orders     = v('orders') * mul;
  const aov        = v('aov');
  const claimsP    = v('claimsRate') / 100;
  const cogsP      = v('cogsPercent') / 100;
  const csPerClaim = v('csCost');
  const compPremP  = v('compPremRate') / 100;
  const compAttP   = v('compAttach') / 100;
  const compRevP   = v('compRevShare') / 100;
  const siPremP    = v('siPremRateM2') / 100;
  const siAttP     = v('siAttachM2') / 100;
  const siRevP     = v('revShareM2') / 100;

  const costPerClaim = aov * cogsP + csPerClaim;
  const compAvgP = aov * compPremP;
  const siAvgP   = tmpl === 'percentage' ? aov * siPremP : getTieredPremium(aov, tmpl);

  // Competitor
  const compProtOrders  = orders * compAttP;
  const compPremiumsIn  = compProtOrders * compAvgP;
  const compProtClaims  = compProtOrders * claimsP;
  const compFunded      = compProtClaims * aov;
  const compPostClaim   = compPremiumsIn - compFunded;
  const compRevShareAmt = compPostClaim * compRevP;
  const compValue       = compFunded + compRevShareAmt;

  // SI
  const siProtOrders  = orders * siAttP;
  const siPremiumsIn  = siProtOrders * siAvgP;
  const siProtClaims  = siProtOrders * claimsP;
  const siFunded      = siProtClaims * aov;
  const siPostClaim   = siPremiumsIn - siFunded;
  const siRevShareAmt = siPostClaim * siRevP;
  const siValue       = siFunded + siRevShareAmt;
  const advantage     = siValue - compValue;

  // Outputs
  document.getElementById('outputsInner').innerHTML =
    omPrimary(fn(orders), isAnnual ? 'Annual Orders' : 'Monthly Orders') +
    om('SI Protected Orders', fn(siProtOrders), 'si-om', 'c-si') +
    om(compName + ' Protected', fn(compProtOrders), 'comp-om', 'c-comp') +
    om('SI Premiums', fc(siPremiumsIn), 'si-om', 'c-si') +
    om(compName + ' Premiums', fc(compPremiumsIn), 'comp-om', 'c-comp') +
    om('SI Funded Claims', fc(siFunded), 'si-om', 'c-si') +
    om('SI Rev Share', fc(siRevShareAmt), 'si-om', 'c-si');

  setHeadline('hb-si', 'SI Advantage vs ' + compName, fc(advantage),
    fc(siRevShareAmt) + ' rev share advantage', fc(siFunded - compFunded) + ' more claims funded');

  // Left: Competitor
  document.getElementById('lcTitle').textContent = compName;
  document.getElementById('lcTotal').className = 'card-ttl c-comp';
  document.getElementById('lcTotal').textContent = fc(compValue);
  document.getElementById('leftCard').className = 'ccard cc-comp';
  document.getElementById('lcMetrics').innerHTML =
    mi('Avg Premium', fcc(compAvgP)) +
    mi('Protected Orders', fn(compProtOrders)) +
    mi('Premiums Collected', fc(compPremiumsIn)) +
    mi('Claims Funded', fc(compFunded)) +
    mi('Rev Share', fc(compRevShareAmt)) +
    mi('Total Program Value', fc(compValue));

  // Right: SI
  document.getElementById('rcTitle').textContent = 'ShipInsure Program';
  document.getElementById('rcTotal').className = 'card-ttl c-si';
  document.getElementById('rcTotal').textContent = fc(siValue);
  document.getElementById('rightCard').className = 'ccard cc-si';
  document.getElementById('rcMetrics').innerHTML =
    mi('Avg Premium', fcc(siAvgP)) +
    mi('Protected Orders', fn(siProtOrders)) +
    mi('Premiums Collected', fc(siPremiumsIn)) +
    mi('Claims Funded', fc(siFunded)) +
    mi('Rev Share', fc(siRevShareAmt)) +
    mi('Total Program Value', fc(siValue));

  _bd = { mode:'m2', orders, aov, claimsP, cogsP, csPerClaim, costPerClaim, compName,
          compAvgP, compAttP, compProtOrders, compPremiumsIn, compProtClaims, compFunded, compRevShareAmt, compValue,
          siAvgP, siAttP, siProtOrders, siPremiumsIn, siProtClaims, siFunded, siRevShareAmt, siValue,
          siRevP, compRevP, advantage, ready:true };
}

// ─── MODE 3: RETURNS OFFSET ───
function calcM3() {
  const isAnnual = vs('timeframe') === 'annual';
  const mul = isAnnual ? 12 : 1;
  const tmpl = vs('siTemplate');

  const orders         = v('orders') * mul;
  const aov            = v('aov');
  const returnsRateP   = v('returnsRate') / 100;
  const labelCost      = v('returnLabelCost');
  const platformFee    = v('platformFee') * mul;
  const siPremP        = v('siPremRateM3') / 100;
  const siAttP         = v('siAttachM3') / 100;

  const siAvgP = tmpl === 'percentage' ? aov * siPremP : getTieredPremium(aov, tmpl);

  const totalReturns       = orders * returnsRateP;
  const totalLabelsCost    = totalReturns * labelCost;
  const totalReturnsBurden = totalLabelsCost + platformFee;

  const siProtOrders    = orders * siAttP;
  const siProtReturns   = siProtOrders * returnsRateP;
  const siCoveredLabels = siProtReturns * labelCost;
  const siCoveredPlat   = platformFee;
  const siTotalOffset   = siCoveredLabels + siCoveredPlat;
  const netBurden       = Math.max(0, totalReturnsBurden - siTotalOffset);

  // Outputs
  document.getElementById('outputsInner').innerHTML =
    omPrimary(fn(orders), isAnnual ? 'Annual Orders' : 'Monthly Orders') +
    om('Total Returns', fn(totalReturns), '', '') +
    om('SI Protected Returns', fn(siProtReturns), 'teal-om', 'c-teal') +
    om('Total Returns Burden', fc(totalReturnsBurden), '', 'c-red') +
    om('SI Labels Coverage', fc(siCoveredLabels), 'teal-om', 'c-teal') +
    om('SI Platform Coverage', fc(siCoveredPlat), 'teal-om', 'c-teal') +
    om('Net Burden After SI', fc(netBurden), '', netBurden > 0 ? 'c-red' : 'c-grn');

  const hbClass = 'hb-teal';
  setHeadline(hbClass, 'Total Returns Offset by SI', fc(siTotalOffset),
    fc(siCoveredLabels) + ' label coverage', fc(siCoveredPlat) + ' platform coverage');
  document.getElementById('headlineBox').className = 'headline-box hb-teal';

  // Left: Returns Burden
  document.getElementById('lcTitle').textContent = 'Current Returns Burden';
  document.getElementById('lcTotal').className = 'card-ttl c-red';
  document.getElementById('lcTotal').textContent = fc(totalReturnsBurden);
  document.getElementById('leftCard').className = 'ccard cc-cost';
  document.getElementById('lcMetrics').innerHTML =
    mi('Total Returns', fn(totalReturns)) +
    mi('Return Label Cost', fc(totalLabelsCost)) +
    mi('Platform Fee', fc(platformFee)) +
    mi('Total Burden', fc(totalReturnsBurden));

  // Right: SI Coverage
  document.getElementById('rcTitle').textContent = 'SI Returns Coverage';
  document.getElementById('rcTotal').className = 'card-ttl c-teal';
  document.getElementById('rcTotal').textContent = fc(siTotalOffset);
  document.getElementById('rightCard').className = 'ccard cc-teal';
  document.getElementById('rcMetrics').innerHTML =
    mi('SI Protected Orders', fn(siProtOrders)) +
    mi('SI Covered Labels', fc(siCoveredLabels)) +
    mi('SI Covered Platform', fc(siCoveredPlat)) +
    mi('Net Burden After SI', fc(netBurden));

  _bd = { mode:'m3', orders, aov, returnsRateP, labelCost, platformFee,
          siAvgP, siAttP, siProtOrders,
          totalReturns, totalLabelsCost, totalReturnsBurden,
          siProtReturns, siCoveredLabels, siCoveredPlat, siTotalOffset, netBurden, ready:true };
}

      row('SI Covered Labels', `${fn(d.siProtReturns)} × ${fc(d.labelCost)}`, fc(d.siCoveredLabels)) +
      row('SI Covered Platform', 'full platform fee', fc(d.siCoveredPlat)) +
      row('Total SI Offset', 'labels + platform', fc(d.siTotalOffset), 'sep s-teal') +
      row('Net Burden After SI', '', fc(d.netBurden), 'sep ' + (d.netBurden>0?'s-red':'s-grn'));
  }
}

// ─── RESET ───
function resetAll() {
  ['orders','aov','claimsRate','cogsPercent','csCost',
   'diyPremRate','diyAttach','siPremRate','siAttach','revShare',
   'compPremRate','compAttach','compRevShare','siPremRateM2','siAttachM2','revShareM2',
   'returnsRate','returnLabelCost','platformFee','siPremRateM3','siAttachM3'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.tagName === 'INPUT') el.value = '';
  });
  document.getElementById('siAttach').value = '68';
  document.getElementById('revShare').value = '35';
  document.getElementById('diyPremRate').value = '3.00';
  document.getElementById('diyAttach').value = '60';
  document.getElementById('siPremRate').value = '3.00';
  document.getElementById('siAttachM2').value = '68';
  document.getElementById('revShareM2').value = '35';
  document.getElementById('compAttach').value = '50';
  document.getElementById('siAttachM3').value = '68';
  document.getElementById('siPremRateM3').value = '3.00';
  recalculate();
}

// ─── LINK ───
// Maps internal input element IDs → short URL param names (proposal-generator compatible)
const _PARAM_MAP = {
  orders: 'orders', aov: 'aov',
  claimsRate: 'cr', cogsPercent: 'cogs', csCost: 'cs',
  // Mode 1 (Self-Insure)
  diyPremRate: 'spp', diyAttach: 'sa',
  siPremRate: 'sipp', siAttach: 'sia', revShare: 'rs',
  // Mode 2 (vs Another Provider)
  compPremRate: 'cpp', compAttach: 'ca', compRevShare: 'crs',
  siPremRateM2: 'sipp2', siAttachM2: 'sia2', revShareM2: 'rs2',
  // Mode 3 (Returns Offset)
  returnsRate: 'rrate', returnLabelCost: 'rlc', platformFee: 'pfee',
  siPremRateM3: 'sipp3', siAttachM3: 'sia3',
  // Selects
  timeframe: 'tf', siTemplate: 'sitm', compName: 'cname'
};

function generateLink() {
  const url = new URL(window.location.href.split('?')[0]);
  url.searchParams.set('mode', _mode);
  Object.entries(_PARAM_MAP).forEach(([internalId, paramKey]) => {
    const el = document.getElementById(internalId);
    if (el) url.searchParams.set(paramKey, el.value);
  });
  document.getElementById('shareableLink').value = url.toString();
  document.getElementById('linkDisplay').style.display = 'flex';
}

function loadSavedValues() {
  const p = new URLSearchParams(window.location.search);
  // Set mode first so correct input rows are shown
  setMode(p.has('mode') ? p.get('mode') : 'm1');
  // Restore all inputs using reverse param map
  Object.entries(_PARAM_MAP).forEach(([internalId, paramKey]) => {
    if (p.has(paramKey)) {
      const el = document.getElementById(internalId);
      if (el) el.value = p.get(paramKey);
    }
  });
  recalculate();
}
function copyLink() {
  const inp = document.getElementById('shareableLink');
  inp.select();
  navigator.clipboard.writeText(inp.value).then(() => {
    const btn = inp.nextElementSibling;
    btn.textContent = '✓ Copied!'; btn.style.background = '#218838';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.background = '#28a745'; }, 2000);
  });
}

// ─── INIT ───
document.querySelectorAll('input[type="text"], select').forEach(el => {
  if (el.id === 'siTemplate' || el.id === 'timeframe' || el.id === 'compName') return;
  el.addEventListener('input', recalculate);
});
document.getElementById('siTemplate').addEventListener('change', recalculate);
document.getElementById('timeframe').addEventListener('change', recalculate);
document.getElementById('compName').addEventListener('change', recalculate);

loadSavedValues();
</script>
