<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipInsure Comparison Calculator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 16px; min-height: 100vh;
  zoom: 0.67; -moz-transform: scale(0.67); -moz-transform-origin: 0 0;
}
.container {
  max-width: 1240px; margin: 0 auto; background: white;
  border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
}

/* ── Top strip ── */
.top-strip {
  background: linear-gradient(135deg, #4a5fc1 0%, #6b7fd7 100%);
  padding: 10px 16px; display: flex; align-items: center;
  gap: 12px; flex-wrap: wrap; justify-content: space-between;
}
.logo-area { display:flex; align-items:center; gap:10px; flex-shrink:0; cursor:pointer; user-select:none; }
.logo-img { height:26px; }
.app-title { font-size:1em; font-weight:700; color:white; white-space:nowrap; }
.tab-bar { display:flex; gap:3px; background:rgba(0,0,0,0.2); padding:4px; border-radius:8px; flex-shrink:0; }
.tab-btn {
  padding:5px 16px; font-size:0.8em; font-weight:600; border:none;
  border-radius:5px; background:transparent; color:rgba(255,255,255,0.7);
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.tab-btn.active { background:white; color:#4a5fc1; }
.ctrl-group {
  display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,0.15); padding:5px 9px; border-radius:6px;
}
.ctrl-group label { font-size:0.79em; font-weight:600; color:white; white-space:nowrap; }
.ctrl-group select {
  padding:3px 7px; font-size:0.79em; border-radius:5px; border:none;
  background:white; color:#4a5fc1; font-weight:600;
}

/* ── Outputs strip ── */
.outputs-strip {
  background:#f8f9fa; border-bottom:1px solid #e9ecef;
  padding:4px 14px 10px;  /* reduced top so inner padding absorbs bubble space */
}
.outputs-inner {
  display:flex; gap:8px;
  overflow-x:auto; overflow-y:visible;
  padding-top:10px;  /* room for bubbles above cards */
}
.output-metric {
  background:white; border:1px solid #dee2e6; border-radius:8px;
  padding:8px 10px; flex:1 1 0; min-width:90px; text-align:center;
  position:relative; overflow:visible;
}
.output-metric.om-primary { border-color:#4a5fc1; background:#f0f3ff; }
.om-label { font-size:0.66em; color:#6c757d; font-weight:500; margin-bottom:3px; line-height:1.2; }
.om-value { font-size:1.05em; font-weight:700; color:#212529; }
.om-value.c-si   { color:#4a5fc1; }
.om-value.c-diy  { color:#e67e22; }
.om-value.c-comp { color:#7c3aed; }
.om-bubble {
  position:absolute; top:-9px; right:-4px;
  background:#198754; color:white;
  font-size:0.58em; font-weight:700; padding:2px 6px; border-radius:10px;
  white-space:nowrap; pointer-events:none; z-index:1;
}
.om-bubble.neg { background:#dc3545; }

/* ── Middle section ── */
.middle-section { padding:14px 14px 10px; }
.headline-row { display:flex; justify-content:center; margin-bottom:12px; }
.headline-box {
  background:linear-gradient(135deg, #4a5fc1 0%, #6b7fd7 100%);
  color:white; border-radius:12px; padding:14px 28px;
  text-align:center; min-width:300px;
}
.hb-label { font-size:0.72em; font-weight:600; opacity:0.85; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.hb-value { font-size:2.1em; font-weight:800; margin-bottom:6px; }
.hb-callout {
  background:rgba(255,255,255,0.15); border-radius:8px;
  padding:6px 12px; font-size:0.77em; font-weight:600; line-height:1.3;
}
.hb-badges { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:4px; }
.hb-badge {
  background:rgba(255,255,255,0.18); border-radius:20px;
  padding:4px 12px; font-size:0.73em; font-weight:600;
}

.cards-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ccard { border-radius:12px; padding:14px 16px; border:2px solid #dee2e6; }
.ccard.cc-diy  { border-color:#e67e22; background:#fffaf5; }
.ccard.cc-comp { border-color:#7c3aed; background:#f9f6ff; }
.ccard.cc-si   { border-color:#4a5fc1; background:#f0f3ff; }
.card-header { margin-bottom:10px; }
.card-prog-label { font-size:0.72em; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:2px; }
.card-prog-label.c-diy  { color:#e67e22; }
.card-prog-label.c-comp { color:#7c3aed; }
.card-prog-label.c-si   { color:#4a5fc1; }
.card-ttl { font-size:1.7em; font-weight:800; }
.card-ttl.c-diy  { color:#e67e22; }
.card-ttl.c-comp { color:#7c3aed; }
.card-ttl.c-si   { color:#4a5fc1; }
.card-ttl.c-neg  { color:#dc3545; }
.card-metric {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 0; border-bottom:1px solid rgba(0,0,0,0.06); font-size:0.8em;
}
.card-metric:last-child { border-bottom:none; }
.cm-lbl { color:#6c757d; }
.cm-val { font-weight:600; color:#212529; }
.cm-val.pos { color:#198754; }
.cm-val.neg { color:#dc3545; }

/* ── Inputs strip ── */
.inputs-strip {
  background:#f8f9fa; border-top:1px solid #e9ecef;
  padding:10px 14px 12px;
}
.inputs-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px;
}
.inputs-title {
  font-size:0.7em; font-weight:700; color:#6c757d;
  text-transform:uppercase; letter-spacing:0.5px;
}
.inputs-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.inputs-row { display:flex; gap:8px; flex-wrap:wrap; }
.inputs-row + .inputs-row { margin-top:6px; }
.ig {
  display:flex; flex-direction:column; gap:3px;
  flex:1 1 0; min-width:82px;
}
.ig label {
  font-size:0.67em; font-weight:600; color:#6c757d;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ig input, .ig select {
  padding:5px 8px; border:1px solid #ced4da; border-radius:6px;
  font-size:0.8em; width:100%; background:white;
}
.ig input:focus, .ig select:focus {
  outline:none; border-color:#4a5fc1;
  box-shadow:0 0 0 2px rgba(74,95,193,0.12);
}
/* Premium type toggle */
.prem-wrap { display:flex; }
.prem-wrap input { border-radius:6px 0 0 6px; flex:1; min-width:0; }
.ptype-btn {
  padding:0 7px; font-size:0.72em; font-weight:700;
  border:1px solid #ced4da; border-left:none;
  background:#f0f0f0; cursor:pointer; color:#6c757d;
  transition:all 0.15s;
}
.ptype-btn:last-child { border-radius:0 6px 6px 0; }
.ptype-btn.active { background:#4a5fc1; color:white; border-color:#4a5fc1; }
/* Returns section */
.returns-row { display:none; flex-wrap:wrap; gap:8px; margin-top:6px; }
.returns-row.visible { display:flex; }
/* Toggle buttons */
.ret-btn {
  padding:5px 10px; font-size:0.74em; font-weight:700;
  border:1px solid #e67e22; border-radius:6px;
  background:white; color:#e67e22; cursor:pointer;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
  transition:all 0.15s;
}
.ret-btn.active { background:#e67e22; color:white; }
.cret-btn {
  padding:5px 10px; font-size:0.74em; font-weight:700;
  border:1px solid #7c3aed; border-radius:6px;
  background:white; color:#7c3aed; cursor:pointer;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
  transition:all 0.15s;
}
.cret-btn.active { background:#7c3aed; color:white; }
/* Primary button */
.btn-gen {
  padding:6px 14px; background:#4a5fc1; color:white;
  border:none; border-radius:6px; font-size:0.78em; font-weight:700;
  cursor:pointer; white-space:nowrap;
}
.btn-gen:hover { background:#3a4fa1; }
/* Link display */
.link-row { display:none; gap:6px; align-items:center; margin-top:6px; }
.link-row.visible { display:flex; }
.link-row input {
  flex:1; padding:5px 8px; border:1px solid #ced4da;
  border-radius:6px; font-size:0.75em; background:#f8f9fa; color:#495057;
}
.link-row .copy-btn {
  padding:5px 10px; background:#28a745; color:white;
  border:none; border-radius:6px; font-size:0.75em; font-weight:600; cursor:pointer;
}

/* ── Breakdown ── */
.calc-breakdown { border-top:1px solid #e9ecef; }
.bd-toggle {
  width:100%; padding:10px 14px; background:#f8f9fa; border:none;
  cursor:pointer; text-align:left; font-size:0.8em; font-weight:600;
  color:#4a5fc1; display:flex; align-items:center; gap:8px;
}
.bd-toggle:hover { background:#eef0f8; }
.bd-arrow { font-size:0.7em; transition:transform 0.2s; display:inline-block; }
.bd-body { display:none; padding:12px 14px; border-top:1px solid #e9ecef; }
.bd-body.open { display:block; }
.bd-shared { background:#f8f9fa; border-radius:8px; padding:10px; margin-bottom:10px; }
.bd-cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.bd-col { border-radius:8px; padding:10px; background:#f8f9fa; }
.bd-title {
  font-size:0.7em; font-weight:700; text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:6px; padding-bottom:4px;
  border-bottom:1px solid #dee2e6;
}
.bd-title.t-shared { color:#6c757d; }
.bd-title.t-neg    { color:#e67e22; }
.bd-title.t-pos    { color:#4a5fc1; }
.bd-row {
  display:grid; grid-template-columns:1fr auto auto;
  gap:8px; padding:3px 0; font-size:0.74em;
  border-bottom:1px dotted #dee2e6;
}
.bd-row:last-child { border-bottom:none; }
.bd-lbl { color:#6c757d; }
.bd-eq  { color:#adb5bd; font-family:monospace; font-size:0.85em; text-align:right; }
.bd-val { font-weight:600; color:#212529; font-family:monospace; min-width:72px; text-align:right; }
</style>
</head>
<body>
<div class="container" id="container">

  <!-- ── Top strip ── -->
  <div class="top-strip">
    <div class="logo-area" id="logoArea">
      <img src="https://shipinsure.io/wp-content/uploads/2023/01/SI_Logo_White.svg"
           class="logo-img" alt="ShipInsure" onerror="this.style.display='none'">
      <div class="app-title">ShipInsure Comparison Calculator</div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-mode="m1" onclick="setMode('m1')">Self-Insure</button>
      <button class="tab-btn"        data-mode="m2" onclick="setMode('m2')">Another Competitor</button>
    </div>
    <div class="ctrl-group">
      <label>View</label>
      <select id="timeframe">
        <option value="monthly">Monthly</option>
        <option value="annual">Annual</option>
      </select>
    </div>
  </div>

  <!-- ── Outputs strip ── -->
  <div class="outputs-strip">
    <div class="outputs-inner" id="outputsInner"></div>
  </div>

  <!-- ── Middle section ── -->
  <div class="middle-section">
    <div class="headline-row">
      <div class="headline-box" id="headlineBox">
        <div class="hb-label" id="hbLabel">SI Direct Financial Advantage</div>
        <div class="hb-value" id="hbValue">—</div>
        <div id="hbSub"></div>
      </div>
    </div>
    <div class="cards-row">
      <div class="ccard cc-diy" id="leftCard">
        <div class="card-header">
          <div class="card-prog-label c-diy" id="lcLabel">Self-Insure Program</div>
          <div class="card-ttl c-diy" id="lcTotal">—</div>
        </div>
        <div id="lcRows"></div>
      </div>
      <div class="ccard cc-si" id="rightCard">
        <div class="card-header">
          <div class="card-prog-label c-si" id="rcLabel">ShipInsure Program</div>
          <div class="card-ttl c-si" id="rcTotal">—</div>
        </div>
        <div id="rcRows"></div>
      </div>
    </div>
  </div>

  <!-- ── Inputs strip ── -->
  <div class="inputs-strip">
    <div class="inputs-header">
      <div class="inputs-title">Merchant Inputs</div>
      <div class="inputs-actions">
        <button class="ret-btn" id="retBtn" onclick="toggleReturns()">
          <span id="retIcon">＋</span> Returns Offset
        </button>
        <button class="cret-btn" id="cretBtn" onclick="toggleCompReturns()" style="display:none;">
          <span id="cretIcon">＋</span> Comp Returns
        </button>
        <button class="btn-gen" onclick="generateLink()">Generate Link</button>
      </div>
    </div>

    <!-- Shared inputs -->
    <div class="inputs-row" id="sharedRow">
      <div class="ig"><label for="orders">Orders</label><input type="text" id="orders" placeholder="0"></div>
      <div class="ig"><label for="aov">AOV</label><input type="text" id="aov" placeholder="$"></div>
      <div class="ig"><label for="claimsRate">Claims Rate %</label><input type="text" id="claimsRate" placeholder="0"></div>
      <div class="ig"><label for="cogsPercent">COGS %</label><input type="text" id="cogsPercent" placeholder="0"></div>
      <div class="ig"><label for="avgShipping">Avg Shipping</label><input type="text" id="avgShipping" placeholder="$"></div>
      <div class="ig"><label for="csCost">Avg Ticket Cost</label><input type="text" id="csCost" placeholder="$"></div>
    </div>

    <!-- Mode 1 inputs -->
    <div class="inputs-row" id="m1Row">
      <div class="ig">
        <label id="diyPremLbl">DIY Premium %</label>
        <div class="prem-wrap">
          <input type="text" id="diyPremRate" placeholder="0">
          <button class="ptype-btn active" id="diyPctBtn" onclick="setDiyType('pct')">%</button>
          <button class="ptype-btn"        id="diyFlatBtn" onclick="setDiyType('flat')">$</button>
        </div>
      </div>
      <div class="ig"><label for="diyAttach">DIY Attach %</label><input type="text" id="diyAttach" placeholder="60" value="60"></div>
      <div class="ig"><label for="siPremRate">SI Premium %</label><input type="text" id="siPremRate" placeholder="3.00" value="3.00"></div>
      <div class="ig"><label for="siAttach">SI Attach %</label><input type="text" id="siAttach" placeholder="68" value="68"></div>
      <div class="ig"><label for="revShare">Net Rev Share %</label><input type="text" id="revShare" placeholder="35" value="35"></div>
    </div>

    <!-- Mode 2 inputs -->
    <div class="inputs-row" id="m2Row" style="display:none;">
      <div class="ig" style="min-width:100px;max-width:130px;">
        <label for="compName">Competitor</label>
        <input type="text" id="compName" placeholder="Enter name">
      </div>
      <div class="ig">
        <label id="compPremLbl">Comp Premium %</label>
        <div class="prem-wrap">
          <input type="text" id="compPremRate" placeholder="0">
          <button class="ptype-btn active" id="compPctBtn" onclick="setCompType('pct')">%</button>
          <button class="ptype-btn"        id="compFlatBtn" onclick="setCompType('flat')">$</button>
        </div>
      </div>
      <div class="ig"><label for="compAttach">Comp Attach %</label><input type="text" id="compAttach" placeholder="50" value="50"></div>
      <div class="ig"><label for="siPremRateM2">SI Premium %</label><input type="text" id="siPremRateM2" placeholder="3.00" value="3.00"></div>
      <div class="ig"><label for="siAttachM2">SI Attach %</label><input type="text" id="siAttachM2" placeholder="68" value="68"></div>
      <div class="ig"><label for="compRevShare">Rev Share % (Comp)</label><input type="text" id="compRevShare" placeholder="0" value="0"></div>
      <div class="ig"><label for="revShareM2">Rev Share % (SI)</label><input type="text" id="revShareM2" placeholder="35" value="35"></div>
    </div>

    <!-- Returns row (both modes) -->
    <div class="returns-row" id="returnsRow">
      <div class="ig" style="max-width:130px;">
        <label for="returnsRate">Returns Rate %</label>
        <input type="text" id="returnsRate" placeholder="0">
      </div>
      <div class="ig" style="max-width:160px;">
        <label for="retPlatform">Returns Platform ($/mo)</label>
        <input type="text" id="retPlatform" placeholder="$">
      </div>
      <div class="ig" id="compRetPlatGroup" style="max-width:190px;display:none;">
        <label for="compRetPlatform">Comp Returns Platform ($/mo)</label>
        <input type="text" id="compRetPlatform" placeholder="$">
      </div>
    </div>

    <!-- Link output -->
    <div class="link-row" id="linkRow">
      <input type="text" id="shareableLink" readonly>
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <!-- ── Breakdown ── -->
  <div class="calc-breakdown">
    <button class="bd-toggle" onclick="toggleBd(this)">
      <span class="bd-arrow" id="bdArrow">▶</span>
      📋 Show Calculation Breakdown
    </button>
    <div class="bd-body" id="bdBody">
      <div class="bd-shared">
        <div class="bd-title t-shared">Inputs &amp; Derived Values</div>
        <div id="bdShared"></div>
      </div>
      <div class="bd-cols">
        <div class="bd-col">
          <div class="bd-title t-neg" id="bdLeftTitle">Self-Insure Program</div>
          <div id="bdLeft"></div>
        </div>
        <div class="bd-col">
          <div class="bd-title t-pos" id="bdRightTitle">ShipInsure Program</div>
          <div id="bdRight"></div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ── State ──
let _mode           = 'm1';
let _retEnabled     = false;
let _cretEnabled    = false;
let _diyType        = 'pct';   // 'pct' | 'flat'
let _compType       = 'pct';
let _bd             = {};

// ── Formatters ──
const fc  = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
const fcc = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
const fn  = v => new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(v);
const fp  = v => parseFloat(v).toFixed(2).replace(/\.?0+$/,'') + '%';
const fpx = v => v.toFixed(1) + '%';

function vn(id) { return parseFloat((document.getElementById(id)?.value||'').replace(/[$,\s]/g,'')) || 0; }
function vs(id) { return document.getElementById(id)?.value || ''; }
function el(id) { return document.getElementById(id); }

// ── Premium type toggles ──
function setDiyType(t) {
  _diyType = t;
  el('diyPctBtn').classList.toggle('active', t === 'pct');
  el('diyFlatBtn').classList.toggle('active', t === 'flat');
  el('diyPremLbl').textContent = t === 'flat' ? 'DIY Premium $' : 'DIY Premium %';
  recalc();
}
function setCompType(t) {
  _compType = t;
  el('compPctBtn').classList.toggle('active', t === 'pct');
  el('compFlatBtn').classList.toggle('active', t === 'flat');
  el('compPremLbl').textContent = t === 'flat' ? 'Comp Premium $' : 'Comp Premium %';
  recalc();
}

// ── Returns toggles ──
function toggleReturns() {
  _retEnabled = !_retEnabled;
  el('retBtn').classList.toggle('active', _retEnabled);
  el('retIcon').textContent = _retEnabled ? '✓' : '＋';
  syncReturnsRow();
  recalc();
}
function toggleCompReturns() {
  _cretEnabled = !_cretEnabled;
  el('cretBtn').classList.toggle('active', _cretEnabled);
  el('cretIcon').textContent = _cretEnabled ? '✓' : '＋';
  el('compRetPlatGroup').style.display = _cretEnabled ? '' : 'none';
  syncReturnsRow();
  recalc();
}
function syncReturnsRow() {
  el('returnsRow').classList.toggle('visible', _retEnabled || _cretEnabled);
}

// ── Mode switching ──
function setMode(m) {
  _mode = m;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  el('m1Row').style.display = m === 'm1' ? 'flex' : 'none';
  el('m2Row').style.display = m === 'm2' ? 'flex' : 'none';
  el('cretBtn').style.display = m === 'm2' ? '' : 'none';
  // If comp returns was on but we switch to m1, hide the extra input but keep state
  if (m === 'm1') el('compRetPlatGroup').style.display = 'none';
  else if (_cretEnabled) el('compRetPlatGroup').style.display = '';
  recalc();
}

// ── Output helpers ──
function omP(val, lbl) {
  return `<div class="output-metric om-primary"><div class="om-label">${lbl}</div><div class="om-value">${val}</div></div>`;
}
function om(lbl, val, cls, siVal, refVal) {
  let bub = '';
  if (siVal !== undefined && refVal !== undefined && refVal !== 0 && Math.abs(siVal - refVal) > 0.001) {
    const pct = ((siVal - refVal) / Math.abs(refVal)) * 100;
    const neg = pct < 0;
    bub = `<div class="om-bubble${neg ? ' neg' : ''}">${neg ? '↓' : '↑'}${Math.abs(pct).toFixed(1)}%</div>`;
  }
  return `<div class="output-metric">${bub}<div class="om-label">${lbl}</div><div class="om-value ${cls||''}">${val}</div></div>`;
}
function mi(lbl, val, cls) {
  return `<div class="card-metric"><span class="cm-lbl">${lbl}</span><span class="cm-val${cls ? ' '+cls : ''}">${val}</span></div>`;
}

// ── Main recalculate ──
function recalc() {
  if (_mode === 'm1') calcM1();
  else calcM2();
  if (el('bdBody').classList.contains('open')) renderBd();
}

// ── Mode 1: Self-Insure vs SI ──
function calcM1() {
  const isAnn = vs('timeframe') === 'annual';
  const mul   = isAnn ? 12 : 1;

  const mo          = vn('orders');
  const aov         = vn('aov');
  const claimsP     = vn('claimsRate') / 100;
  const cogsP       = vn('cogsPercent') / 100;
  const ship        = vn('avgShipping');
  const cs          = vn('csCost');
  const diyPremRaw  = vn('diyPremRate');
  const diyAttP     = vn('diyAttach') / 100;
  const siPremP     = vn('siPremRate') / 100;
  const siAttP      = vn('siAttach') / 100;
  const rsP         = vn('revShare') / 100;

  const orders = mo * mul;

  // Avg premiums
  const diyAvgP = _diyType === 'flat' ? diyPremRaw : aov * (diyPremRaw / 100);
  const siAvgP  = aov * siPremP;

  // Cost formulas
  const diyClaimCostPer = (aov * cogsP) + ship + cs;   // merchant pays COGS + shipping + CS
  const siFundedPer     = aov + ship;                   // SI funds AOV + shipping

  // DIY program
  const diyProt    = orders * diyAttP;
  const diyPremsIn = diyProt * diyAvgP;
  const diyProtCl  = diyProt * claimsP;
  const diyClCost  = diyProtCl * diyClaimCostPer;
  const diyNet     = diyPremsIn - diyClCost;

  // SI program
  const siProt     = orders * siAttP;
  const siPremsIn  = siProt * siAvgP;
  const siProtCl   = siProt * claimsP;
  const siFunded   = siProtCl * siFundedPer;
  const postClaim  = siPremsIn - siFunded;
  const siRevSh    = Math.max(0, postClaim) * rsP;
  const siNet      = postClaim + siRevSh;

  // Returns offset
  let retOffset = 0, retBurden = 0;
  let totRet = 0, retLabTot = 0, retPlatTot = 0, siCovLab = 0, siCovPlat = 0;
  if (_retEnabled) {
    const retP    = vn('returnsRate') / 100;
    const platMo  = vn('retPlatform');
    const labCost = ship;  // return label cost = avg shipping
    const platPer = platMo * mul;
    totRet    = orders * retP;
    retLabTot = totRet * labCost;
    retPlatTot = platPer;
    retBurden = retLabTot + retPlatTot;
    const siProtRet = siProt * retP;
    siCovLab  = siProtRet * labCost;
    siCovPlat = platPer;
    retOffset = siCovLab + siCovPlat;
  }

  const advantage = (siNet + retOffset) - (diyNet - retBurden);
  const attachLift = (siAttP - diyAttP) * 100;

  // Outputs
  el('outputsInner').innerHTML =
    omP(fn(mo), 'Monthly Orders') +
    om('DIY Protected Orders',   fn(diyProt),    'c-diy',  null) +
    om('SI Protected Orders',    fn(siProt),     'c-si',   siProt,    diyProt) +
    om('Avg DIY Premium',        fcc(diyAvgP),   'c-diy',  null) +
    om('Avg SI Premium',         fcc(siAvgP),    'c-si',   siAvgP,   diyAvgP) +
    om('DIY Premiums Collected', fc(diyPremsIn), 'c-diy',  null) +
    om('SI Premiums Collected',  fc(siPremsIn),  'c-si',   siPremsIn, diyPremsIn);

  // Headline
  el('hbLabel').textContent = 'SI Direct Financial Advantage';
  el('hbValue').textContent = fc(advantage);
  if (Math.abs(attachLift) > 0.05) {
    const dir = attachLift > 0 ? '↑' : '↓';
    const lbl = attachLift > 0
      ? `${dir} ShipInsure drives <strong>${Math.abs(attachLift).toFixed(1)}pt</strong> higher attach → more protected orders + more premiums in.`
      : `${dir} DIY has <strong>${Math.abs(attachLift).toFixed(1)}pt</strong> higher attach rate in this scenario.`;
    el('hbSub').innerHTML = `<div class="hb-callout">${lbl}</div>`;
  } else {
    el('hbSub').innerHTML = '';
  }

  // Left card: DIY
  el('lcLabel').textContent = 'Self-Insure Program';
  el('lcLabel').className   = 'card-prog-label c-diy';
  el('lcTotal').textContent = fc(diyNet);
  el('lcTotal').className   = 'card-ttl ' + (diyNet >= 0 ? 'c-diy' : 'c-neg');
  el('leftCard').className  = 'ccard cc-diy';
  el('lcRows').innerHTML =
    mi('Gross Premiums',         fc(diyPremsIn)) +
    mi('Protected Claims',       fn(diyProtCl)) +
    mi('Claims Cost (COGS+Ship+CS)', fc(diyClCost), 'neg') +
    mi('Net Premium',            fc(diyNet), diyNet >= 0 ? 'pos' : 'neg');

  // Right card: SI
  el('rcLabel').textContent = 'ShipInsure Program';
  el('rcLabel').className   = 'card-prog-label c-si';
  el('rcTotal').textContent = fc(siNet);
  el('rcTotal').className   = 'card-ttl c-si';
  el('rightCard').className = 'ccard cc-si';
  el('rcRows').innerHTML =
    mi('Gross Premiums',              fc(siPremsIn)) +
    mi('Protected Claims',            fn(siProtCl)) +
    mi('SI Funded Claims (AOV+Ship)', fc(siFunded),  'neg') +
    mi('Net Premiums (incl. Rev Share)', fc(siNet),  siNet >= 0 ? 'pos' : 'neg');

  _bd = {
    mode:'m1', isAnn, mul, mo, orders, aov, claimsP, cogsP, ship, cs,
    diyClaimCostPer, siFundedPer, diyAvgP, diyAttP, diyProt, diyPremsIn, diyProtCl, diyClCost, diyNet,
    siAvgP, siAttP, siProt, siPremsIn, siProtCl, siFunded, postClaim, siRevSh, siNet, rsP,
    attachLift, advantage,
    retEnabled:_retEnabled, totRet, retLabTot, retPlatTot, retBurden, siCovLab, siCovPlat, retOffset,
    ready:true
  };
}

// ── Mode 2: Another Competitor vs SI ──
function calcM2() {
  const isAnn = vs('timeframe') === 'annual';
  const mul   = isAnn ? 12 : 1;
  const cname = vs('compName') || 'Competitor';

  const mo          = vn('orders');
  const aov         = vn('aov');
  const claimsP     = vn('claimsRate') / 100;
  const cogsP       = vn('cogsPercent') / 100;
  const ship        = vn('avgShipping');
  const cs          = vn('csCost');
  const compPremRaw = vn('compPremRate');
  const compAttP    = vn('compAttach') / 100;
  const compRsP     = vn('compRevShare') / 100;
  const siPremP     = vn('siPremRateM2') / 100;
  const siAttP      = vn('siAttachM2') / 100;
  const siRsP       = vn('revShareM2') / 100;

  const orders = mo * mul;

  const compAvgP = _compType === 'flat' ? compPremRaw : aov * (compPremRaw / 100);
  const siAvgP   = aov * siPremP;
  const fundedPer = aov + ship;  // both fund at AOV + shipping

  // Competitor program
  const compProt   = orders * compAttP;
  const compPremsIn = compProt * compAvgP;
  const compProtCl  = compProt * claimsP;
  const compFunded  = compProtCl * fundedPer;
  const compPost    = compPremsIn - compFunded;
  const compRevSh   = Math.max(0, compPost) * compRsP;
  const compNet     = compPost + compRevSh;

  // SI program
  const siProt    = orders * siAttP;
  const siPremsIn = siProt * siAvgP;
  const siProtCl  = siProt * claimsP;
  const siFunded  = siProtCl * fundedPer;
  const siPost    = siPremsIn - siFunded;
  const siRevSh   = Math.max(0, siPost) * siRsP;
  const siNet     = siPost + siRevSh;

  // Returns
  let siRetOff = 0, compRetOff = 0;
  let totRet = 0, siCovLab = 0, siCovPlat = 0, compCovLab = 0, compCovPlat = 0;
  const retP = vn('returnsRate') / 100;
  if (_retEnabled || _cretEnabled) {
    totRet = orders * retP;
  }
  if (_retEnabled) {
    const platMo  = vn('retPlatform');
    const platPer = platMo * mul;
    siCovLab  = (siProt * retP) * ship;
    siCovPlat = platPer;
    siRetOff  = siCovLab + siCovPlat;
  }
  if (_cretEnabled) {
    const cplatMo  = vn('compRetPlatform');
    const cplatPer = cplatMo * mul;
    compCovLab  = (compProt * retP) * ship;
    compCovPlat = cplatPer;
    compRetOff  = compCovLab + compCovPlat;
  }

  const advantage = (siNet + siRetOff) - (compNet + compRetOff);

  // Diff badges
  const rsDiffAmt  = siRevSh - compRevSh;
  const clDiffPct  = compFunded > 0 ? ((siFunded - compFunded) / compFunded) * 100 : 0;

  // Outputs
  el('outputsInner').innerHTML =
    omP(fn(mo), 'Monthly Orders') +
    om(cname + ' Protected Orders', fn(compProt),    'c-comp', null) +
    om('SI Protected Orders',       fn(siProt),      'c-si',   siProt,    compProt) +
    om('Avg ' + cname + ' Premium', fcc(compAvgP),   'c-comp', null) +
    om('Avg SI Premium',            fcc(siAvgP),     'c-si',   siAvgP,    compAvgP) +
    om(cname + ' Premiums Collected', fc(compPremsIn),'c-comp', null) +
    om('SI Premiums Collected',     fc(siPremsIn),   'c-si',   siPremsIn, compPremsIn);

  // Headline
  el('hbLabel').textContent = 'SI Advantage vs ' + cname;
  el('hbValue').textContent = fc(advantage);
  const rsLbl = rsDiffAmt >= 0
    ? `↑ ${fc(rsDiffAmt)} more rev share`
    : `↓ ${fc(Math.abs(rsDiffAmt))} less rev share`;
  const clLbl = clDiffPct >= 0
    ? `↑ ${Math.abs(clDiffPct).toFixed(1)}% more claims funded`
    : `↓ ${Math.abs(clDiffPct).toFixed(1)}% fewer claims funded`;
  el('hbSub').innerHTML =
    `<div class="hb-badges"><div class="hb-badge">${rsLbl}</div><div class="hb-badge">${clLbl}</div></div>`;

  // Left card: Competitor
  el('lcLabel').textContent = cname + ' Program';
  el('lcLabel').className   = 'card-prog-label c-comp';
  el('lcTotal').textContent = fc(compNet);
  el('lcTotal').className   = 'card-ttl ' + (compNet >= 0 ? 'c-comp' : 'c-neg');
  el('leftCard').className  = 'ccard cc-comp';
  el('lcRows').innerHTML =
    mi('Gross Premiums',   fc(compPremsIn)) +
    mi('Protected Claims', fn(compProtCl)) +
    mi('Funded Claims',    fc(compFunded), 'neg') +
    mi('Net Premium',      fc(compPost)) +
    mi('Rev Share',        fc(compRevSh), 'pos');

  // Right card: SI
  el('rcLabel').textContent = 'ShipInsure Program';
  el('rcLabel').className   = 'card-prog-label c-si';
  el('rcTotal').textContent = fc(siNet);
  el('rcTotal').className   = 'card-ttl c-si';
  el('rightCard').className = 'ccard cc-si';
  el('rcRows').innerHTML =
    mi('Gross Premiums',   fc(siPremsIn)) +
    mi('Protected Claims', fn(siProtCl)) +
    mi('SI Funded Claims', fc(siFunded),  'neg') +
    mi('Net Premiums',     fc(siPost)) +
    mi('Rev Share',        fc(siRevSh),   'pos');

  _bd = {
    mode:'m2', isAnn, mul, mo, orders, aov, claimsP, ship, fundedPer, cname,
    compAvgP, compAttP, compProt, compPremsIn, compProtCl, compFunded, compPost, compRevSh, compNet, compRsP,
    siAvgP, siAttP, siProt, siPremsIn, siProtCl, siFunded, siPost, siRevSh, siNet, siRsP,
    advantage, retEnabled:_retEnabled, cretEnabled:_cretEnabled,
    totRet, siCovLab, siCovPlat, siRetOff, compCovLab, compCovPlat, compRetOff,
    ready:true
  };
}

// ── Breakdown ──
function toggleBd(btn) {
  const body = el('bdBody');
  const arrow = el('bdArrow');
  const open = body.classList.toggle('open');
  arrow.style.transform = open ? 'rotate(90deg)' : '';
  if (open) renderBd();
}

function renderBd() {
  if (!_bd.ready) return;
  const r = (lbl, eq, val) =>
    `<div class="bd-row"><span class="bd-lbl">${lbl}</span><span class="bd-eq">${eq}</span><span class="bd-val">${val}</span></div>`;

  if (_bd.mode === 'm1') {
    el('bdShared').innerHTML =
      r('Monthly Orders',     '',                        fn(_bd.mo)) +
      r('AOV',                '',                        fc(_bd.aov)) +
      r('Claims Rate',        '',                        fp(_bd.claimsP * 100)) +
      r('COGS %',             '',                        fp(_bd.cogsP * 100)) +
      r('Avg Shipping',       '',                        fc(_bd.ship)) +
      r('CS Ticket Cost',     '',                        fc(_bd.cs)) +
      r('DIY Claim Cost/Cl',  'AOV×COGS + Ship + CS',   fc(_bd.diyClaimCostPer)) +
      r('SI Funded/Claim',    'AOV + Ship',              fc(_bd.siFundedPer)) +
      (_bd.retEnabled ? r('Returns Label Cost', '= Avg Shipping', fc(_bd.ship)) : '');

    el('bdLeftTitle').textContent = 'Self-Insure Program';
    el('bdLeft').innerHTML =
      r('Protected Orders',  `${fn(_bd.orders)} × ${fpx(_bd.diyAttP * 100)}`,           fn(_bd.diyProt)) +
      r('Avg DIY Premium',   _diyType === 'flat' ? 'flat fee' : `AOV × ${fpx(_bd.diyAvgP/_bd.aov*100)}`, fcc(_bd.diyAvgP)) +
      r('Gross Premiums',    `${fn(_bd.diyProt)} × ${fcc(_bd.diyAvgP)}`,                fc(_bd.diyPremsIn)) +
      r('Protected Claims',  `${fn(_bd.diyProt)} × ${fp(_bd.claimsP * 100)}`,           fn(_bd.diyProtCl)) +
      r('Claims Cost',       `${fn(_bd.diyProtCl)} × ${fc(_bd.diyClaimCostPer)}`,       fc(_bd.diyClCost)) +
      r('Net Premium',       'Premiums − Claims',                                        fc(_bd.diyNet));

    el('bdRightTitle').textContent = 'ShipInsure Program';
    el('bdRight').innerHTML =
      r('Protected Orders',  `${fn(_bd.orders)} × ${fpx(_bd.siAttP * 100)}`,            fn(_bd.siProt)) +
      r('Avg SI Premium',    `AOV × ${fpx(_bd.siAvgP/(_bd.aov||1)*100)}`,               fcc(_bd.siAvgP)) +
      r('Gross Premiums',    `${fn(_bd.siProt)} × ${fcc(_bd.siAvgP)}`,                  fc(_bd.siPremsIn)) +
      r('Protected Claims',  `${fn(_bd.siProt)} × ${fp(_bd.claimsP * 100)}`,            fn(_bd.siProtCl)) +
      r('SI Funded Claims',  `${fn(_bd.siProtCl)} × ${fc(_bd.siFundedPer)}`,            fc(_bd.siFunded)) +
      r('Post-Claim Balance','Premiums − Funded',                                        fc(_bd.postClaim)) +
      r('Rev Share',         `max(0, PostClaim) × ${fpx(_bd.rsP * 100)}`,               fc(_bd.siRevSh)) +
      r('Net Premiums',      'PostClaim + RevShare',                                     fc(_bd.siNet));

  } else {
    el('bdShared').innerHTML =
      r('Monthly Orders',    '',                  fn(_bd.mo)) +
      r('AOV',               '',                  fc(_bd.aov)) +
      r('Claims Rate',       '',                  fp(_bd.claimsP * 100)) +
      r('Avg Shipping',      '',                  fc(_bd.ship)) +
      r('Funded Per Claim',  'AOV + Ship',        fc(_bd.fundedPer));

    el('bdLeftTitle').textContent = _bd.cname + ' Program';
    el('bdLeft').innerHTML =
      r('Protected Orders',  `${fn(_bd.orders)} × ${fpx(_bd.compAttP * 100)}`,          fn(_bd.compProt)) +
      r('Avg Premium',       _compType === 'flat' ? 'flat fee' : `AOV × rate`,           fcc(_bd.compAvgP)) +
      r('Gross Premiums',    '',                                                          fc(_bd.compPremsIn)) +
      r('Protected Claims',  '',                                                          fn(_bd.compProtCl)) +
      r('Funded Claims',     `${fn(_bd.compProtCl)} × ${fc(_bd.fundedPer)}`,             fc(_bd.compFunded)) +
      r('Net Premium',       'Premiums − Funded',                                        fc(_bd.compPost)) +
      r('Rev Share',         `max(0,Post) × ${fpx(_bd.compRsP * 100)}`,                 fc(_bd.compRevSh));

    el('bdRightTitle').textContent = 'ShipInsure Program';
    el('bdRight').innerHTML =
      r('Protected Orders',  `${fn(_bd.orders)} × ${fpx(_bd.siAttP * 100)}`,            fn(_bd.siProt)) +
      r('Avg Premium',       `AOV × ${fpx(_bd.siAvgP/(_bd.aov||1)*100)}`,               fcc(_bd.siAvgP)) +
      r('Gross Premiums',    '',                                                          fc(_bd.siPremsIn)) +
      r('Protected Claims',  '',                                                          fn(_bd.siProtCl)) +
      r('SI Funded Claims',  `${fn(_bd.siProtCl)} × ${fc(_bd.fundedPer)}`,              fc(_bd.siFunded)) +
      r('Net Premiums',      'Premiums − Funded',                                        fc(_bd.siPost)) +
      r('Rev Share',         `max(0,Post) × ${fpx(_bd.siRsP * 100)}`,                   fc(_bd.siRevSh));
  }
}

// ── Link ──
const _PMAP = {
  orders:'orders', aov:'aov', claimsRate:'cr', cogsPercent:'cogs',
  avgShipping:'aship', csCost:'cs',
  diyPremRate:'spp', diyAttach:'sa', siPremRate:'sipp', siAttach:'sia', revShare:'rs',
  compName:'cname', compPremRate:'cpp', compAttach:'ca', compRevShare:'crs',
  siPremRateM2:'sipp2', siAttachM2:'sia2', revShareM2:'rs2',
  returnsRate:'rrate', retPlatform:'rplat', compRetPlatform:'crplat',
  timeframe:'tf'
};

function generateLink() {
  const url = new URL(window.location.href.split('?')[0]);
  url.searchParams.set('mode', _mode);
  url.searchParams.set('ret',  _retEnabled  ? '1' : '0');
  url.searchParams.set('cret', _cretEnabled ? '1' : '0');
  url.searchParams.set('dpt',  _diyType);
  url.searchParams.set('cpt',  _compType);
  Object.entries(_PMAP).forEach(([id, key]) => {
    const e = el(id);
    if (e) url.searchParams.set(key, e.value);
  });
  el('shareableLink').value = url.toString();
  el('linkRow').classList.add('visible');
}

function copyLink() {
  const inp = el('shareableLink');
  inp.select();
  navigator.clipboard.writeText(inp.value).then(() => {
    const btn = inp.nextElementSibling;
    btn.textContent = '✓ Copied!'; btn.style.background = '#218838';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.background = '#28a745'; }, 2000);
  });
}

function loadSaved() {
  const p = new URLSearchParams(window.location.search);
  setMode(p.has('mode') ? p.get('mode') : 'm1');
  Object.entries(_PMAP).forEach(([id, key]) => {
    if (p.has(key)) { const e = el(id); if (e) e.value = p.get(key); }
  });
  if (p.get('dpt') === 'flat') setDiyType('flat');
  if (p.get('cpt') === 'flat') setCompType('flat');
  if (p.get('ret')  === '1' && !_retEnabled)  toggleReturns();
  if (p.get('cret') === '1' && !_cretEnabled) toggleCompReturns();
  recalc();
}

// ── Reset ──
function resetAll() {
  ['orders','aov','claimsRate','cogsPercent','avgShipping','csCost',
   'diyPremRate','siPremRate','compName','compPremRate','compRevShare',
   'returnsRate','retPlatform','compRetPlatform'].forEach(id => {
    const e = el(id); if (e) e.value = '';
  });
  el('diyAttach').value    = '60';
  el('siAttach').value     = '68';
  el('revShare').value     = '35';
  el('compAttach').value   = '50';
  el('siPremRateM2').value = '3.00';
  el('siAttachM2').value   = '68';
  el('revShareM2').value   = '35';
  el('timeframe').value    = 'monthly';
  if (_retEnabled)  toggleReturns();
  if (_cretEnabled) toggleCompReturns();
  if (_diyType  !== 'pct') setDiyType('pct');
  if (_compType !== 'pct') setCompType('pct');
  el('linkRow').classList.remove('visible');
  setMode('m1');
}

// ── Init ──
document.querySelectorAll('input[type="text"]').forEach(e => e.addEventListener('input', recalc));
document.querySelectorAll('select').forEach(e => e.addEventListener('change', recalc));
el('logoArea').addEventListener('click', resetAll);

loadSaved();
</script>
