<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipInsure Comparison Calculator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 16px; min-height: 100vh;
  zoom: 0.67; -moz-transform: scale(0.67); -moz-transform-origin: 0 0;
}
.container {
  max-width: 1240px; margin: 0 auto; background: white;
  border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
}
.top-strip {
  background: linear-gradient(135deg, #6675FF 0%, #8a96ff 100%);
  padding: 10px 16px; display: flex; align-items: center;
  gap: 12px; flex-wrap: wrap; justify-content: space-between;
}
.logo-area { display:flex; align-items:center; gap:10px; flex-shrink:0; cursor:pointer; user-select:none; }
.logo-img { height:26px; }
.app-title { font-size:1em; font-weight:700; color:white; white-space:nowrap; }
.tab-bar { display:flex; gap:3px; background:rgba(0,0,0,0.2); padding:4px; border-radius:8px; flex-shrink:0; }
.tab-btn {
  padding:5px 16px; font-size:0.8em; font-weight:600; border:none;
  border-radius:5px; background:transparent; color:rgba(255,255,255,0.7);
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.tab-btn.active { background:white; color:#6675FF; }
.ctrl-group {
  display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,0.15); padding:5px 9px; border-radius:6px;
}
.ctrl-group label { font-size:0.79em; font-weight:600; color:white; white-space:nowrap; }
.ctrl-group select {
  padding:3px 7px; font-size:0.79em; border-radius:5px; border:none;
  background:white; color:#6675FF; font-weight:600;
}
.outputs-strip {
  background:#f8f9fa; border-bottom:1px solid #e9ecef;
  padding:4px 14px 10px;
}
.outputs-inner {
  display:flex; gap:8px;
  overflow-x:auto; overflow-y:visible;
  padding-top:10px;
}
.output-metric {
  background:white; border:1px solid #dee2e6; border-radius:8px;
  padding:8px 10px; flex:1 1 0; min-width:90px; text-align:center;
  position:relative; overflow:visible;
}
.output-metric.om-primary { border-color:#6675FF; background:#eef0ff; }
.om-label { font-size:0.66em; color:#6c757d; font-weight:500; margin-bottom:3px; line-height:1.2; }
.om-value { font-size:1.05em; font-weight:700; color:#212529; }
.om-value.c-si   { color:#6675FF; }
.om-value.c-diy  { color:#e67e22; }
.om-value.c-comp { color:#333; }
.om-bubble {
  position:absolute; top:-9px; right:-4px;
  background:#198754; color:white;
  font-size:0.58em; font-weight:700; padding:2px 6px; border-radius:10px;
  white-space:nowrap; pointer-events:none; z-index:1;
}
.om-bubble.neg { background:#dc3545; }
.middle-section { padding:14px 14px 10px; }
.headline-row { display:flex; justify-content:center; margin-bottom:12px; }
.headline-box {
  background:linear-gradient(135deg, #6675FF 0%, #8a96ff 100%);
  color:white; border-radius:12px; padding:14px 28px;
  text-align:center; min-width:300px;
}
.hb-label { font-size:0.72em; font-weight:600; opacity:0.85; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.hb-value { font-size:2.1em; font-weight:800; margin-bottom:6px; }
.hb-callout {
  background:rgba(255,255,255,0.15); border-radius:8px;
  padding:6px 12px; font-size:0.77em; font-weight:600; line-height:1.3;
}
.hb-badges { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:4px; }
.hb-badge {
  background:rgba(255,255,255,0.18); border-radius:20px;
  padding:4px 12px; font-size:0.73em; font-weight:600;
}
.cards-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ccard { border-radius:12px; padding:14px 16px; border:2px solid #dee2e6; }
.ccard.cc-diy  { border-color:#e67e22; background:#fffaf5; }
.ccard.cc-comp { border-color:#555; background:#f8f8f8; }
.ccard.cc-si   { border-color:#6675FF; background:#eef0ff; }
.card-header { margin-bottom:10px; }
.card-prog-label { font-size:0.72em; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:2px; }
.card-prog-label.c-diy  { color:#e67e22; }
.card-prog-label.c-comp { color:#333; }
.card-prog-label.c-si   { color:#6675FF; }
.card-ttl { font-size:1.7em; font-weight:800; }
.card-ttl.c-diy  { color:#e67e22; }
.card-ttl.c-comp { color:#333; }
.card-ttl.c-si   { color:#6675FF; }
.card-ttl.c-neg  { color:#dc3545; }
.card-metric {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 0; border-bottom:1px solid rgba(0,0,0,0.06); font-size:0.8em;
}
.card-metric:last-child { border-bottom:none; }
.cm-lbl { color:#6c757d; }
.cm-val { font-weight:600; color:#212529; }
.cm-val.pos { color:#198754; }
.cm-val.neg { color:#dc3545; }
.cm-section {
  padding:6px 0 2px; font-size:0.68em; font-weight:700;
  color:#6c757d; text-transform:uppercase; letter-spacing:0.5px;
  border-top:1px solid #dee2e6; margin-top:4px; display:block;
}
.inputs-strip {
  background:#f8f9fa; border-top:1px solid #e9ecef;
  padding:10px 14px 12px;
}
.inputs-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px;
}
.inputs-title {
  font-size:0.7em; font-weight:700; color:#6c757d;
  text-transform:uppercase; letter-spacing:0.5px;
}
.inputs-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.inputs-row { display:flex; gap:8px; flex-wrap:wrap; }
.inputs-row + .inputs-row { margin-top:6px; }
.ig {
  display:flex; flex-direction:column; gap:3px;
  flex:1 1 0; min-width:82px;
}
.ig label {
  font-size:0.67em; font-weight:600; color:#6c757d;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ig input, .ig select {
  padding:5px 8px; border:1px solid #ced4da; border-radius:6px;
  font-size:0.8em; width:100%; background:white;
}
.ig input:focus, .ig select:focus {
  outline:none; border-color:#6675FF;
  box-shadow:0 0 0 2px rgba(102,117,255,0.12);
}
.prem-wrap { display:flex; }
.prem-wrap input { border-radius:6px 0 0 6px; flex:1; min-width:0; }
.ptype-btn {
  padding:0 7px; font-size:0.72em; font-weight:700;
  border:1px solid #ced4da; border-left:none;
  background:#f0f0f0; cursor:pointer; color:#6c757d;
  transition:all 0.15s;
}
.ptype-btn:last-child { border-radius:0 6px 6px 0; }
.ptype-btn.active { background:#6675FF; color:white; border-color:#6675FF; }
.returns-row { display:none; flex-wrap:wrap; gap:8px; margin-top:6px; }
.returns-row.visible { display:flex; }
.ret-btn {
  padding:5px 10px; font-size:0.74em; font-weight:700;
  border:1px solid #e67e22; border-radius:6px;
  background:white; color:#e67e22; cursor:pointer;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
  transition:all 0.15s;
}
.ret-btn.active { background:#e67e22; color:white; }
.cret-btn {
  padding:5px 10px; font-size:0.74em; font-weight:700;
  border:1px solid #555; border-radius:6px;
  background:white; color:#555; cursor:pointer;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
  transition:all 0.15s;
}
.cret-btn.active { background:#555; color:white; }
.btn-gen {
  padding:6px 14px; background:#6675FF; color:white;
  border:none; border-radius:6px; font-size:0.78em; font-weight:700;
  cursor:pointer; white-space:nowrap;
}
.btn-gen:hover { background:#5564ee; }
.link-row { display:none; gap:6px; align-items:center; margin-top:6px; }
.link-row.visible { display:flex; }
.link-row input {
  flex:1; padding:5px 8px; border:1px solid #ced4da;
  border-radius:6px; font-size:0.75em; background:#f8f9fa; color:#495057;
}
.link-row .copy-btn {
  padding:5px 10px; background:#28a745; color:white;
  border:none; border-radius:6px; font-size:0.75em; font-weight:600; cursor:pointer;
}
.calc-breakdown { border-top:1px solid #e9ecef; }
.bd-toggle {
  width:100%; padding:10px 14px; background:#f8f9fa; border:none;
  cursor:pointer; text-align:left; font-size:0.8em; font-weight:600;
  color:#6675FF; display:flex; align-items:center; gap:8px;
}
.bd-toggle:hover { background:#eef0ff; }
.bd-arrow { font-size:0.7em; transition:transform 0.2s; display:inline-block; }
.bd-body { display:none; padding:12px 14px; border-top:1px solid #e9ecef; }
.bd-body.open { display:block; }
.bd-shared { background:#f8f9fa; border-radius:8px; padding:10px; margin-bottom:10px; }
.bd-cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.bd-col { border-radius:8px; padding:10px; background:#f8f9fa; }
.bd-title {
  font-size:0.7em; font-weight:700; text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:6px; padding-bottom:4px;
  border-bottom:1px solid #dee2e6;
}
.bd-title.t-shared { color:#6c757d; }
.bd-title.t-neg    { color:#e67e22; }
.bd-title.t-pos    { color:#6675FF; }
.bd-row {
  display:grid; grid-template-columns:1fr auto auto;
  gap:8px; padding:3px 0; font-size:0.74em;
  border-bottom:1px dotted #dee2e6;
}
.bd-row:last-child { border-bottom:none; }
.bd-lbl { color:#6c757d; }
.bd-eq  { color:#adb5bd; font-family:monospace; font-size:0.85em; text-align:right; }
.bd-val { font-weight:600; color:#212529; font-family:monospace; min-width:72px; text-align:right; }
</style>
</head>
<body>
<div class="container" id="container">
  <div class="top-strip">
    <div class="logo-area" id="logoArea">
      <img src="https://shipinsure.io/wp-content/uploads/2023/01/SI_Logo_White.svg"
           class="logo-img" alt="ShipInsure" onerror="this.style.display='none'">
      <div class="app-title">ShipInsure Comparison Calculator</div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-mode="m1" onclick="setMode('m1')">Self-Insure</button>
      <button class="tab-btn"        data-mode="m2" onclick="setMode('m2')">Another Competitor</button>
    </div>
    <div class="ctrl-group">
      <label>View</label>
      <select id="timeframe">
        <option value="monthly">Monthly</option>
        <option value="annual">Annual</option>
      </select>
    </div>
  </div>
  <div class="outputs-strip">
    <div class="outputs-inner" id="outputsInner"></div>
  </div>
  <div class="middle-section">
    <div class="headline-row">
      <div class="headline-box" id="headlineBox">
        <div class="hb-label" id="hbLabel">SI Direct Financial Advantage</div>
        <div class="hb-value" id="hbValue">—</div>
        <div id="hbSub"></div>
      </div>
    </div>
    <div class="cards-row">
      <div class="ccard cc-diy" id="leftCard">
        <div class="card-header">
          <div class="card-prog-label c-diy" id="lcLabel">Self-Insure Program</div>
          <div class="card-ttl c-diy" id="lcTotal">—</div>
        </div>
        <div id="lcRows"></div>
      </div>
      <div class="ccard cc-si" id="rightCard">
        <div class="card-header">
          <div class="card-prog-label c-si" id="rcLabel">ShipInsure Program</div>
          <div class="card-ttl c-si" id="rcTotal">—</div>
        </div>
        <div id="rcRows"></div>
      </div>
    </div>
  </div>
  <div class="inputs-strip">
    <div class="inputs-header">
      <div class="inputs-title">Merchant Inputs</div>
      <div class="inputs-actions">
        <button class="ret-btn" id="retBtn" onclick="toggleReturns()">
          <span id="retIcon">+</span> Returns Offset
        </button>
        <button class="cret-btn" id="cretBtn" onclick="toggleCompReturns()" style="display:none;">
          <span id="cretIcon">+</span> Comp Returns
        </button>
        <button class="btn-gen" onclick="generateLink()">Generate Link</button>
      </div>
    </div>
    <div class="inputs-row" id="sharedRow">
      <div class="ig"><label for="orders">Orders</label><input type="text" id="orders" placeholder="0"></div>
      <div class="ig"><label for="aov">AOV</label><input type="text" id="aov" placeholder="$"></div>
      <div class="ig">
        <label id="claimsLbl">Claims Rate %</label>
        <div class="prem-wrap">
          <input type="text" id="claimsRate" placeholder="0">
          <button class="ptype-btn active" id="claimsPctBtn"  onclick="setClaimsType('pct')">#%</button>
          <button class="ptype-btn"        id="claimsNumBtn"  onclick="setClaimsType('count')">#</button>
        </div>
      </div>
      <div class="ig">
        <label id="cogsLbl">Product Cost %</label>
        <div class="prem-wrap">
          <input type="text" id="cogsPercent" placeholder="0">
          <button class="ptype-btn active" id="cogsPctBtn"  onclick="setCogsType('pct')">%</button>
          <button class="ptype-btn"        id="cogsFlatBtn" onclick="setCogsType('flat')">$</button>
        </div>
      </div>
      <div class="ig"><label for="avgShipping">Avg Shipping</label><input type="text" id="avgShipping" placeholder="$"></div>
      <div class="ig"><label for="csCost">Avg Ticket Cost</label><input type="text" id="csCost" placeholder="$"></div>
    </div>
    <div class="inputs-row" id="m1Row">
      <div class="ig">
        <label id="diyPremLbl">DIY Premium %</label>
        <div class="prem-wrap">
          <input type="text" id="diyPremRate" placeholder="0">
          <button class="ptype-btn active" id="diyPctBtn" onclick="setDiyType('pct')">%</button>
          <button class="ptype-btn"        id="diyFlatBtn" onclick="setDiyType('flat')">$</button>
        </div>
      </div>
      <div class="ig"><label for="diyAttach">DIY Attach %</label><input type="text" id="diyAttach" placeholder="60" value="60"></div>
      <div class="ig"><label for="siPremRate">SI Premium %</label><input type="text" id="siPremRate" placeholder="3.00" value="3.00"></div>
      <div class="ig"><label for="siAttach">SI Attach %</label><input type="text" id="siAttach" placeholder="68" value="68"></div>
      <div class="ig"><label for="revShare">Net Rev Share %</label><input type="text" id="revShare" placeholder="35" value="35"></div>
    </div>
    <div id="m2Row" style="display:none; margin-top:6px;">
      <div style="display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap;">
        <div style="display:flex; gap:8px; flex:1; flex-wrap:wrap; min-width:220px; padding:8px 10px; background:#f3f3f3; border-radius:8px; border:1px solid #ccc;">
          <div style="width:100%; font-size:0.65em; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px;">Competitor</div>
          <div class="ig" style="min-width:100px;max-width:130px;">
            <label for="compName">Name</label>
            <input type="text" id="compName" placeholder="Enter name">
          </div>
          <div class="ig">
            <label id="compPremLbl">Premium %</label>
            <div class="prem-wrap">
              <input type="text" id="compPremRate" placeholder="0">
              <button class="ptype-btn active" id="compPctBtn" onclick="setCompType('pct')">%</button>
              <button class="ptype-btn"        id="compFlatBtn" onclick="setCompType('flat')">$</button>
            </div>
          </div>
          <div class="ig"><label for="compAttach">Attach %</label><input type="text" id="compAttach" placeholder="50" value="50"></div>
          <div class="ig"><label for="compRevShare">Rev Share %</label><input type="text" id="compRevShare" placeholder="0" value="0"></div>
        </div>
        <div style="display:flex; gap:8px; flex:1; flex-wrap:wrap; min-width:220px; padding:8px 10px; background:#eef0ff; border-radius:8px; border:1px solid #b7bfff;">
          <div style="width:100%; font-size:0.65em; font-weight:700; color:#6675FF; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px;">ShipInsure</div>
          <div class="ig">
            <label id="siPremLblM2">SI Premium %</label>
            <div class="prem-wrap">
              <input type="text" id="siPremRateM2" placeholder="3.00" value="3.00">
              <button class="ptype-btn active" id="siPctBtnM2"  onclick="setSiTypeM2('pct')">%</button>
              <button class="ptype-btn"        id="siFlatBtnM2" onclick="setSiTypeM2('flat')">$</button>
            </div>
          </div>
          <div class="ig"><label for="siAttachM2">SI Attach %</label><input type="text" id="siAttachM2" placeholder="68" value="68"></div>
          <div class="ig"><label for="revShareM2">Rev Share %</label><input type="text" id="revShareM2" placeholder="35" value="35"></div>
        </div>
      </div>
    </div>
    <div class="returns-row" id="returnsRow">
      <div class="ig" style="max-width:160px;">
        <label id="returnsLbl">Returns Rate %</label>
        <div class="prem-wrap">
          <input type="text" id="returnsRate" placeholder="0">
          <button class="ptype-btn active" id="retPctBtn"  onclick="setReturnsType('pct')">%</button>
          <button class="ptype-btn"        id="retNumBtn"  onclick="setReturnsType('count')">#</button>
        </div>
      </div>
      <div class="ig" style="max-width:160px;">
        <label for="retPlatform">AfterShip Platform ($/mo)</label>
        <input type="text" id="retPlatform" placeholder="$">
      </div>
      <div class="ig" style="max-width:150px;">
        <label for="siPlatCov">AfterShip % Covered by SI</label>
        <input type="text" id="siPlatCov" placeholder="100" value="100">
      </div>
      <div class="ig" id="compRetPlatGroup" style="max-width:190px;display:none;">
        <label for="compRetPlatform">Comp Platform ($/mo)</label>
        <input type="text" id="compRetPlatform" placeholder="$">
      </div>
      <div class="ig" id="compPlatCovGroup" style="max-width:170px;display:none;">
        <label for="compPlatCov">Comp Platform % Covered</label>
        <input type="text" id="compPlatCov" placeholder="0" value="0">
      </div>
    </div>
    <div class="link-row" id="linkRow">
      <input type="text" id="shareableLink" readonly>
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>
  <div class="calc-breakdown">
    <button class="bd-toggle" onclick="toggleBd(this)">
      <span class="bd-arrow" id="bdArrow">▶</span>
      📋 Show Calculation Breakdown
    </button>
    <div class="bd-body" id="bdBody">
      <div class="bd-shared">
        <div class="bd-title t-shared">Inputs &amp; Derived Values</div>
        <div id="bdShared"></div>
      </div>
      <div class="bd-cols">
        <div class="bd-col">
          <div class="bd-title t-neg" id="bdLeftTitle">Self-Insure Program</div>
          <div id="bdLeft"></div>
        </div>
        <div class="bd-col">
          <div class="bd-title t-pos" id="bdRightTitle">ShipInsure Program</div>
          <div id="bdRight"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
let _mode='m1',_retEnabled=false,_cretEnabled=false,_diyType='pct',_compType='pct',_siTypeM2='pct',_cogsType='pct',_claimsType='pct',_returnsType='pct',_prevTimeframe='monthly',_bd={};
const fc  = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
const fcc = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
const fn  = v => new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(v);
const fp  = v => parseFloat(v).toFixed(2).replace(/\.?0+$/,'') + '%';
const fpx = v => v.toFixed(1) + '%';
function vn(id){return parseFloat((document.getElementById(id)?.value||'').replace(/[$,\s]/g,''))||0;}
function vs(id){return document.getElementById(id)?.value||'';}
function el(id){return document.getElementById(id);}
function setDiyType(t){_diyType=t;el('diyPctBtn').classList.toggle('active',t==='pct');el('diyFlatBtn').classList.toggle('active',t==='flat');el('diyPremLbl').textContent=t==='flat'?'DIY Premium $':'DIY Premium %';recalc();}
function setCompType(t){_compType=t;el('compPctBtn').classList.toggle('active',t==='pct');el('compFlatBtn').classList.toggle('active',t==='flat');el('compPremLbl').textContent=t==='flat'?'Premium $':'Premium %';recalc();}
function setSiTypeM2(t){_siTypeM2=t;el('siPctBtnM2').classList.toggle('active',t==='pct');el('siFlatBtnM2').classList.toggle('active',t==='flat');el('siPremLblM2').textContent=t==='flat'?'SI Premium $':'SI Premium %';recalc();}
function setCogsType(t){_cogsType=t;el('cogsPctBtn').classList.toggle('active',t==='pct');el('cogsFlatBtn').classList.toggle('active',t==='flat');el('cogsLbl').textContent=t==='flat'?'Product Cost $':'Product Cost %';recalc();}
function setClaimsType(t){_claimsType=t;el('claimsPctBtn').classList.toggle('active',t==='pct');el('claimsNumBtn').classList.toggle('active',t==='count');el('claimsLbl').textContent=t==='count'?'Claims Count #':'Claims Rate %';recalc();}
function setReturnsType(t){_returnsType=t;el('retPctBtn').classList.toggle('active',t==='pct');el('retNumBtn').classList.toggle('active',t==='count');el('returnsLbl').textContent=t==='count'?'Returns Count #':'Returns Rate %';recalc();}
function toggleReturns(){_retEnabled=!_retEnabled;el('retBtn').classList.toggle('active',_retEnabled);el('retIcon').textContent=_retEnabled?'✓':'+';syncReturnsRow();recalc();}

function omP(val,lbl){return `<div class="output-metric om-primary"><div class="om-label">${lbl}</div><div class="om-value">${val}</div></div>`;}
function om(lbl,val,cls,siVal,refVal){
  let bub='';
  if(siVal!==undefined&&refVal!==undefined&&refVal!==0&&Math.abs(siVal-refVal)>0.001){
    const pct=((siVal-refVal)/Math.abs(refVal))*100;const neg=pct<0;
    bub=`<div class="om-bubble${neg?' neg':''}">${neg?'↓':'↑'}${Math.abs(pct).toFixed(1)}%</div>`;
  }
  return `<div class="output-metric">${bub}<div class="om-label">${lbl}</div><div class="om-value ${cls||''}">${val}</div></div>`;
}

function calcM1(){
  const isAnn=vs('timeframe')==='annual';const mul=isAnn?12:1;
  const mo=vn('orders'),aov=vn('aov'),ship=vn('avgShipping'),cs=vn('csCost');
  const diyPremRaw=vn('diyPremRate'),diyAttP=vn('diyAttach')/100,siPremP=vn('siPremRate')/100,siAttP=vn('siAttach')/100,rsP=vn('revShare')/100;
  const orders=mo*mul;
  const cogsRaw=vn('cogsPercent'),cogsP=_cogsType==='flat'?(aov>0?cogsRaw/aov:0):cogsRaw/100;
  const claimRaw=vn('claimsRate'),claimsP=_claimsType==='count'?(orders>0?claimRaw/orders:0):claimRaw/100;
  const diyAvgP=_diyType==='flat'?diyPremRaw:aov*(diyPremRaw/100);
  const siAvgP=aov*siPremP;
  const diyClaimCostPer=(aov*cogsP)+ship+cs;
  const siFundedPer=aov+ship;
  const diyProt=orders*diyAttP,diyPremsIn=diyProt*diyAvgP,diyProtCl=diyProt*claimsP,diyClCost=diyProtCl*diyClaimCostPer,diyNet=diyPremsIn-diyClCost;
  const siProt=orders*siAttP,siPremsIn=siProt*siAvgP,siProtCl=siProt*claimsP,siFunded=siProtCl*siFundedPer,postClaim=siPremsIn-siFunded,siRevSh=Math.max(0,postClaim)*rsP,siNet=postClaim+siRevSh;
  let retOffset=0,retBurden=0,retP=0,totRet=0,retLabTot=0,retPlatTot=0,siCovLab=0,siCovPlat=0,siPlatCovP=1;
  if(_retEnabled){
    const retRaw=vn('returnsRate');
    retP=_returnsType==='count'?(orders>0?retRaw/orders:0):retRaw/100;
    const platMo=vn('retPlatform'),platPer=platMo*mul;
    siPlatCovP=vn('siPlatCov')/100;totRet=orders*retP;retLabTot=totRet*ship;retPlatTot=platPer;retBurden=retLabTot+retPlatTot;
    siCovLab=(siProt*retP)*ship;siCovPlat=platPer*siPlatCovP;retOffset=siCovLab+siCovPlat;
  }
  const advantage=(siNet+retOffset)-(diyNet-retBurden);
  const attachLift=(siAttP-diyAttP)*100;
  el('outputsInner').innerHTML=omP(fn(isAnn?orders:mo),isAnn?'Annual Orders':'Monthly Orders')+om('DIY Protected Orders',fn(diyProt),'c-diy',null)+om('SI Protected Orders',fn(siProt),'c-si',siProt,diyProt)+om('Avg DIY Premium',fcc(diyAvgP),'c-diy',null)+om('Avg SI Premium',fcc(siAvgP),'c-si',siAvgP,diyAvgP)+om('DIY Premiums Collected',fc(diyPremsIn),'c-diy',null)+om('SI Premiums Collected',fc(siPremsIn),'c-si',siPremsIn,diyPremsIn);
  el('hbLabel').textContent='SI Direct Financial Advantage';
  el('hbValue').textContent=fc(advantage);
  if(Math.abs(attachLift)>0.05){
    const dir=attachLift>0?'↑':'↓';
    const lbl=attachLift>0?`${dir} ShipInsure drives <strong>${Math.abs(attachLift).toFixed(1)}pt</strong> higher attach → more protected orders + more premiums in.`:`${dir} DIY has <strong>${Math.abs(attachLift).toFixed(1)}pt</strong> higher attach rate in this scenario.`;
    el('hbSub').innerHTML=`<div class="hb-callout">${lbl}</div>`;
  }else{el('hbSub').innerHTML='';}
  const diyTotalFull=_retEnabled?diyNet-retBurden:diyNet;
  el('lcLabel').textContent='Self-Insure Program';el('lcLabel').className='card-prog-label c-diy';
  el('lcTotal').textContent=fc(diyTotalFull);el('lcTotal').className='card-ttl '+(diyTotalFull>=0?'c-diy':'c-neg');
  el('leftCard').className='ccard cc-diy';
  el('lcRows').innerHTML=mi('Gross Premiums',fc(diyPremsIn))+mi('Protected Claims',fn(diyProtCl))+mi('Claims Cost (COGS+Ship+CS)',fc(diyClCost),'neg')+mi('Net Protection',fc(diyNet),diyNet>=0?'pos':'neg')+(_retEnabled?ms('Returns (Self-Managed)')+mi('Return Labels',fc(retLabTot),'neg')+mi('Returns Platform',fc(retPlatTot),'neg')+mi('Total Returns Burden',fc(retBurden),'neg')+mi('Program Total',fc(diyTotalFull),diyTotalFull>=0?'pos':'neg'):'');
  const siTotalFull=_retEnabled?siNet+retOffset:siNet;
  el('rcLabel').textContent='ShipInsure Program';el('rcLabel').className='card-prog-label c-si';
  el('rcTotal').textContent=fc(siTotalFull);el('rcTotal').className='card-ttl c-si';
  el('rightCard').className='ccard cc-si';
  el('rcRows').innerHTML=mi('Gross Premiums',fc(siPremsIn))+mi('Protected Claims',fn(siProtCl))+mi('SI Funded Claims (AOV+Ship)',fc(siFunded),'neg')+mi('Net Premiums (incl. Rev Share)',fc(siNet),siNet>=0?'pos':'neg')+(_retEnabled?ms('Returns Offset (SI Covers)')+mi('Label Coverage',fc(siCovLab),'pos')+mi('Platform Coverage',fc(siCovPlat),'pos')+mi('Total Returns Offset',fc(retOffset),'pos')+mi('Program Total',fc(siTotalFull),'pos'):'');
  _bd={mode:'m1',isAnn,mul,mo,orders,aov,claimsP,cogsP,ship,cs,diyClaimCostPer,siFundedPer,diyAvgP,diyAttP,diyProt,diyPremsIn,diyProtCl,diyClCost,diyNet,siAvgP,siAttP,siProt,siPremsIn,siProtCl,siFunded,postClaim,siRevSh,siNet,rsP,attachLift,advantage,retEnabled:_retEnabled,retP,totRet,retLabTot,retPlatTot,retBurden,siCovLab,siCovPlat,retOffset,siPlatCovP,ready:true};
}

function calcM2(){
  const isAnn=vs('timeframe')==='annual';const mul=isAnn?12:1;
  const cname=vs('compName')||'Competitor';
  const mo=vn('orders'),aov=vn('aov'),ship=vn('avgShipping'),cs=vn('csCost');
  const compPremRaw=vn('compPremRate'),compAttP=vn('compAttach')/100,compRsP=vn('compRevShare')/100;
  const siAttP=vn('siAttachM2')/100,siRsP=vn('revShareM2')/100;
  const orders=mo*mul;
  const cogsRaw=vn('cogsPercent'),cogsP=_cogsType==='flat'?(aov>0?cogsRaw/aov:0):cogsRaw/100;
  const claimRaw=vn('claimsRate'),claimsP=_claimsType==='count'?(orders>0?claimRaw/orders:0):claimRaw/100;
  const compAvgP=_compType==='flat'?compPremRaw:aov*(compPremRaw/100);
  const siPremRaw=vn('siPremRateM2'),siAvgP=_siTypeM2==='flat'?siPremRaw:aov*(siPremRaw/100);
  const fundedPer=aov+ship;
  // Competitor
  const compProt=orders*compAttP,compPremsIn=compProt*compAvgP,compProtCl=compProt*claimsP;
  const compFunded=compProtCl*fundedPer,compPost=compPremsIn-compFunded,compRevSh=Math.max(0,compPost)*compRsP,compNet=compPost+compRevSh;
  // SI
  const siProt=orders*siAttP,siPremsIn=siProt*siAvgP,siProtCl=siProt*claimsP;
  const siFunded=siProtCl*fundedPer,siPost=siPremsIn-siFunded,siRevSh=Math.max(0,siPost)*siRsP,siNet=siPost+siRevSh;
  // Returns
  let siRetOff=0,compRetOff=0,totRet=0,siCovLab=0,siCovPlat=0,compCovLab=0,compCovPlat=0;
  let siPlatCovP=1,compPlatCovP=0,siPlatPer=0,compPlatPer=0;
  const retRaw=vn('returnsRate');
  const retP=_returnsType==='count'?(orders>0?retRaw/orders:0):retRaw/100;
  if(_retEnabled||_cretEnabled){totRet=orders*retP;}
  if(_retEnabled){siPlatPer=vn('retPlatform')*mul;siPlatCovP=vn('siPlatCov')/100;siCovLab=(siProt*retP)*ship;siCovPlat=siPlatPer*siPlatCovP;siRetOff=siCovLab+siCovPlat;}
  if(_cretEnabled){compPlatPer=vn('compRetPlatform')*mul;compPlatCovP=vn('compPlatCov')/100;compCovLab=(compProt*retP)*ship;compCovPlat=compPlatPer*compPlatCovP;compRetOff=compCovLab+compCovPlat;}

  // ── CHANGED: advantage = (SI funded claims + SI rev share) - (Comp funded claims + Comp rev share)
  const advantage=(siFunded+siRevSh+siRetOff)-(compFunded+compRevSh+compRetOff);

  const rsDiffAmt=siRevSh-compRevSh;
  const clDiffPct=compFunded>0?((siFunded-compFunded)/compFunded)*100:0;
  // ── NEW: gross premium diff badge
  const grossPremDiff=siPremsIn-compPremsIn;

  el('outputsInner').innerHTML=omP(fn(isAnn?orders:mo),isAnn?'Annual Orders':'Monthly Orders')+om(cname+' Protected Orders',fn(compProt),'c-comp',null)+om('SI Protected Orders',fn(siProt),'c-si',siProt,compProt)+om('Avg '+cname+' Premium',fcc(compAvgP),'c-comp',null)+om('Avg SI Premium',fcc(siAvgP),'c-si',siAvgP,compAvgP)+om(cname+' Premiums Collected',fc(compPremsIn),'c-comp',null)+om('SI Premiums Collected',fc(siPremsIn),'c-si',siPremsIn,compPremsIn);
  el('hbLabel').textContent='SI Advantage vs '+cname;
  el('hbValue').textContent=fc(advantage);
  const rsLbl=rsDiffAmt>=0?`↑ ${fc(rsDiffAmt)} more rev share`:`↓ ${fc(Math.abs(rsDiffAmt))} less rev share`;
  const clLbl=clDiffPct>=0?`↑ ${Math.abs(clDiffPct).toFixed(1)}% more claims funded`:`↓ ${Math.abs(clDiffPct).toFixed(1)}% fewer claims funded`;
  const gpLbl=grossPremDiff>=0?`↑ ${fc(grossPremDiff)} more in premiums`:`↓ ${fc(Math.abs(grossPremDiff))} less in premiums`;
  el('hbSub').innerHTML=`<div class="hb-badges"><div class="hb-badge">${rsLbl}</div><div class="hb-badge">${clLbl}</div><div class="hb-badge">${gpLbl}</div></div>`;

  const compPlatPct=compPlatCovP*100,siPlatPct=siPlatCovP*100;
  const compTotalFull=_cretEnabled?compNet+compRetOff:compNet;
  el('lcLabel').textContent=cname+' Program';el('lcLabel').className='card-prog-label c-comp';
  el('lcTotal').textContent=fc(compTotalFull);el('lcTotal').className='card-ttl '+(compTotalFull>=0?'c-comp':'c-neg');
  el('leftCard').className='ccard cc-comp';
  el('lcRows').innerHTML=mi('Gross Premiums',fc(compPremsIn))+mi('Protected Claims',fn(compProtCl))+mi('Funded Claims',fc(compFunded),'neg')+mi('Net Premium',fc(compPost))+mi('Rev Share',fc(compRevSh),'pos')+(_cretEnabled?ms('Returns Offset (Comp Covers)')+mi('Label Coverage',fc(compCovLab),'pos')+mi('Platform Cost',fc(compCovPlat),'pos')+mi('% Platform Cost Covered',fpx(compPlatPct))+mi('Total Returns Offset',fc(compRetOff),'pos')+mi('Program Total',fc(compTotalFull),compTotalFull>=0?'pos':'neg'):'');
  const siTotalFullM2=_retEnabled?siNet+siRetOff:siNet;
  el('rcLabel').textContent='ShipInsure Program';el('rcLabel').className='card-prog-label c-si';
  el('rcTotal').textContent=fc(siTotalFullM2);el('rcTotal').className='card-ttl c-si';
  el('rightCard').className='ccard cc-si';
  el('rcRows').innerHTML=mi('Gross Premiums',fc(siPremsIn))+mi('Protected Claims',fn(siProtCl))+mi('SI Funded Claims',fc(siFunded),'neg')+mi('Net Premiums',fc(siPost))+mi('Rev Share',fc(siRevSh),'pos')+(_retEnabled?ms('Returns Offset (SI Covers)')+mi('Label Coverage',fc(siCovLab),'pos')+mi('AfterShip Platform',fc(siCovPlat),'pos')+mi('% Platform Cost Covered',fpx(siPlatPct))+mi('Total Returns Offset',fc(siRetOff),'pos')+mi('Program Total',fc(siTotalFullM2),'pos'):'');
  _bd={mode:'m2',isAnn,mul,mo,orders,aov,claimsP,ship,fundedPer,cname,compAvgP,compAttP,compProt,compPremsIn,compProtCl,compFunded,compPost,compRevSh,compNet,compRsP,siAvgP,siAttP,siProt,siPremsIn,siProtCl,siFunded,siPost,siRevSh,siNet,siRsP,advantage,retEnabled:_retEnabled,cretEnabled:_cretEnabled,retP,totRet,siCovLab,siCovPlat,siRetOff,siPlatCovP,siPlatPer,compCovLab,compCovPlat,compRetOff,compPlatCovP,compPlatPer,ready:true};
}

function generateLink(){
  const url=new URL(window.location.href.split('?')[0]);
  url.searchParams.set('mode',_mode);url.searchParams.set('ret',_retEnabled?'1':'0');url.searchParams.set('cret',_cretEnabled?'1':'0');
  url.searchParams.set('dpt',_diyType);url.searchParams.set('cpt',_compType);url.searchParams.set('spt2',_siTypeM2);url.searchParams.set('cogst',_cogsType);url.searchParams.set('claimst',_claimsType);url.searchParams.set('retst',_returnsType);
  Object.entries(_PMAP).forEach(([id,key])=>{const e=el(id);if(e)url.searchParams.set(key,e.value);});
  el('shareableLink').value=url.toString();el('linkRow').classList.add('visible');
}
function copyLink(){

function loadSaved(){
  const p=new URLSearchParams(window.location.search);
  setMode(p.has('mode')?p.get('mode'):'m1');
  Object.entries(_PMAP).forEach(([id,key])=>{if(p.has(key)){const e=el(id);if(e)e.value=p.get(key);}});
  if(p.get('dpt')==='flat')setDiyType('flat');if(p.get('cpt')==='flat')setCompType('flat');if(p.get('spt2')==='flat')setSiTypeM2('flat');if(p.get('cogst')==='flat')setCogsType('flat');if(p.get('claimst')==='count')setClaimsType('count');if(p.get('retst')==='count')setReturnsType('count');

  ['orders','aov','claimsRate','cogsPercent','avgShipping','csCost','diyPremRate','siPremRate','compName','compPremRate','compRevShare','returnsRate','retPlatform','compRetPlatform','compPlatCov'].forEach(id=>{const e=el(id);if(e)e.value='';});
  el('diyAttach').value='60';el('siAttach').value='68';el('revShare').value='35';el('compAttach').value='50';
  el('siPremRateM2').value='3.00';el('siAttachM2').value='68';el('revShareM2').value='35';
  el('siPlatCov').value='100';el('compPlatCov').value='0';el('timeframe').value='monthly';
  if(_retEnabled)toggleReturns();if(_cretEnabled)toggleCompReturns();
  if(_diyType!=='pct')setDiyType('pct');if(_compType!=='pct')setCompType('pct');if(_siTypeM2!=='pct')setSiTypeM2('pct');if(_cogsType!=='pct')setCogsType('pct');if(_claimsType!=='pct')setClaimsType('pct');if(_returnsType!=='pct')setReturnsType('pct');
  _prevTimeframe='monthly';el('linkRow').classList.remove('visible');setMode('m1');
}
document.querySelectorAll('input[type="text"]').forEach(e=>e.addEventListener('input',recalc));
el('timeframe').addEventListener('change',function(){
  const curr=this.value,ordEl=el('orders'),v=parseFloat((ordEl.value||'').replace(/[$,\s]/g,''));
  if(!isNaN(v)&&v>0){if(_prevTimeframe==='monthly'&&curr==='annual')ordEl.value=Math.round(v*12);else if(_prevTimeframe==='annual'&&curr==='monthly')ordEl.value=Math.round(v/12);}
  _prevTimeframe=curr;recalc();
});
el('logoArea').addEventListener('click',resetAll);
loadSaved();
</script>
</body>
</html>
